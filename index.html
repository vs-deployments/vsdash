// ─── SALESFORCE INTEGRATION ─────────────────────────────────────────────────────
// SETUP REQUIRED (one-time, Salesforce Admin):
//  1. SF Setup → App Manager → New Connected App
//     · Callback URL: YOUR_SITE_URL

const SF_CLIENT_ID  = "YOUR_SF_CLIENT_ID";   // ← paste your Connected App key here
const SF_REDIRECT   = SITE_URL;
const SF_LOGIN_URL  = "https://login.salesforce.com";
const SF_API_VER    = "v59.0";
const SF_CONFIGURED = SF_CLIENT_ID !== "YOUR_SF_CLIENT_ID";

// ── Salesforce field names for VergeSense-specific custom fields ──
// Change these if your org uses different API names
const SF_CSM_FIELD    = "CSM__r.Name";          // lookup to User; try also Customer_Success_Manager__r.Name
const SF_INSTALL_FLD  = "Install_Date__c";
const SF_GOLIVE_FLD   = "Go_Live_Date__c";
// Kickoff Date lives in Smartsheet, not Salesforce — see Smartsheet panel below

// ── OAuth PKCE helpers ──
const sfAuth = {
  _rnd: () => { const a=new Uint8Array(32); crypto.getRandomValues(a); return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); },
  _sha: async v => { const d=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v)); return btoa(String.fromCharCode(...new Uint8Array(d))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); },
  startAuth: async () => {
    const v = sfAuth._rnd(), c = await sfAuth._sha(v);
    sessionStorage.setItem('sf_cv', v);
    window.location.href = SF_LOGIN_URL + '/services/oauth2/authorize?' + new URLSearchParams({response_type:'code',client_id:SF_CLIENT_ID,redirect_uri:SF_REDIRECT,scope:'api',code_challenge:c,code_challenge_method:'S256'});
  },
  handleCallback: async () => {
    const url = new URL(window.location.href);
    const code = url.searchParams.get('code');
    if (!code) return false;
    const v = sessionStorage.getItem('sf_cv');
    if (!v) return false;
    try {
      const r = await fetch(SF_LOGIN_URL+'/services/oauth2/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:new URLSearchParams({grant_type:'authorization_code',code,client_id:SF_CLIENT_ID,redirect_uri:SF_REDIRECT,code_verifier:v}).toString()});
      if (!r.ok) return false;
      const d = await r.json();
      if (!d.access_token) return false;
      sessionStorage.setItem('sf_tok', d.access_token);
      sessionStorage.setItem('sf_inst', d.instance_url);
      sessionStorage.removeItem('sf_cv');
      window.history.replaceState({}, '', SF_REDIRECT);
      return true;
    } catch(e) { return false; }
  },
  setManual: (inst, tok) => { sessionStorage.setItem('sf_inst', inst.replace(/\/+$/,'')); sessionStorage.setItem('sf_tok', tok); },
  disconnect: () => { ['sf_tok','sf_inst','sf_cv'].forEach(k=>sessionStorage.removeItem(k)); },
  isConnected: () => !!sessionStorage.getItem('sf_tok'),
  tok: () => sessionStorage.getItem('sf_tok'),
  inst: () => sessionStorage.getItem('sf_inst'),
};

const _sfFetch = async (path) => {
  const base=sfAuth.inst(), tok=sfAuth.tok();
  if (!base||!tok) return null;
  try { const r=await fetch(base+'/services/data/'+SF_API_VER+path,{headers:{'Authorization':'Bearer '+tok}}); return r.ok?await r.json():null; } catch(e){ return null; }
};
const _sfQuery = async (soql) => {
  const d = await _sfFetch('/query?q='+encodeURIComponent(soql));
  return d && Array.isArray(d.records) ? d.records : null;
};

const _extractOppId = url => {
  if (!url) return null;
  const m = url.match(/\/Opportunity\/([0-9A-Za-z]{15,18})/i) || url.match(/\b(006[0-9A-Za-z]{12,15})\b/);
  return m ? m[1] : null;
};
const _fmtAddr = (st,ci,st2,zip,co) => [st,[ci,st2?(st2+(zip?' '+zip:'')):zip||''].filter(Boolean).join(', '),co].filter(Boolean).join('\n');

const loadSFOpportunity = async (sfUrl) => {
  if (!sfAuth.isConnected()) return {error:'Not connected to Salesforce'};
  const oppId = _extractOppId(sfUrl);
  if (!oppId) return {error:'Could not extract Opportunity ID. Use a Lightning or Classic SF URL.'};

  // Build SOQL — try with VergeSense custom fields, fall back on failure
  const baseFields = `Id,Name,AccountId,Account.Name,Account.ShippingStreet,Account.ShippingCity,Account.ShippingState,Account.ShippingPostalCode,Account.ShippingCountry,Owner.Name,CloseDate`;
  const customFields = `${SF_CSM_FIELD},${SF_INSTALL_FLD},${SF_GOLIVE_FLD}`;

  let opps = await _sfQuery(`SELECT ${baseFields},${customFields} FROM Opportunity WHERE Id='${oppId}'`);
  let hasCustom = !!opps;
  if (!opps) opps = await _sfQuery(`SELECT ${baseFields} FROM Opportunity WHERE Id='${oppId}'`);
  if (!opps || !opps[0]) return {error:'Opportunity not found or insufficient permissions.'};

  const opp = opps[0];
  const acc = opp.Account || {};

  // Fetch in parallel: contacts, line items, AND the Order for site/shipping address
  const [contacts, lineItems, orders, ordersByQuote] = await Promise.all([
    _sfQuery(`SELECT Contact.Name,Contact.Email,Contact.Phone FROM OpportunityContactRoles WHERE OpportunityId='${oppId}' AND IsPrimary=true LIMIT 1`),
    _sfQuery(`SELECT Quantity,PricebookEntry.Product2.Name,PricebookEntry.Name FROM OpportunityLineItems WHERE OpportunityId='${oppId}'`),
    // Try direct OpportunityId link on Order (works if org has this field)
    _sfQuery(`SELECT ShippingStreet,ShippingCity,ShippingState,ShippingPostalCode,ShippingCountry FROM Order WHERE OpportunityId='${oppId}' ORDER BY CreatedDate DESC LIMIT 1`),
    // Fallback: link via Quote
    _sfQuery(`SELECT ShippingStreet,ShippingCity,ShippingState,ShippingPostalCode,ShippingCountry FROM Order WHERE Quote.OpportunityId='${oppId}' ORDER BY CreatedDate DESC LIMIT 1`),
  ]);

  const poc    = contacts && contacts[0];
  const order  = (orders && orders[0]) || (ordersByQuote && ordersByQuote[0]) || null;
  const devices = (lineItems||[]).map(li=>({type:li.PricebookEntry?.Product2?.Name||li.PricebookEntry?.Name||'Product',qty:String(Math.round(li.Quantity||1)),shipListLink:''}));

  // Site/shipping address: Order shipping address is the actual deployment site.
  // Fall back to Account shipping address if no Order exists yet.
  const orderAddr = order ? _fmtAddr(order.ShippingStreet,order.ShippingCity,order.ShippingState,order.ShippingPostalCode,order.ShippingCountry) : '';
  const acctAddr  = _fmtAddr(acc.ShippingStreet,acc.ShippingCity,acc.ShippingState,acc.ShippingPostalCode,acc.ShippingCountry);
  const siteAddr  = orderAddr || acctAddr; // Order is more accurate when it exists

  // CSM: if CSM__r is a relationship, it comes back as nested object
  const csmVal = hasCustom ? (opp.CSM__r?.Name || opp[SF_CSM_FIELD] || '') : '';

  return {
    success: true,
    data: {
      clientName:      acc.Name || '',
      ae:              opp.Owner?.Name || '',
      csm:             typeof csmVal === 'object' ? (csmVal?.Name||'') : (csmVal||''),
      pocName:         poc?.Contact?.Name  || '',
      pocEmail:        poc?.Contact?.Email || '',
      pocPhone:        poc?.Contact?.Phone || '',
      siteAddress:     siteAddr,     // From Order.ShippingAddress (deployment site)
      shippingAddress: siteAddr,     // Same — hardware ships to the deployment site
      installDate:     hasCustom ? (opp[SF_INSTALL_FLD]||'') : '',
      goLiveTarget:    hasCustom ? (opp[SF_GOLIVE_FLD]||opp.CloseDate||'') : (opp.CloseDate||''),
      // kickoffDate intentionally omitted — pull from Smartsheet instead
      devices:         devices.length ? devices : undefined,
    }
  };
};

// ─── SMARTSHEET INTEGRATION ──────────────────────────────────────────────────
// No admin setup required. Get your personal API token:
// Smartsheet → avatar → Personal Settings → API Access → Generate new access token
const SS_API = 'https://api.smartsheet.com/2.0';

const ssAuth = {
  setToken: tok => sessionStorage.setItem('ss_tok', tok),
  tok: () => sessionStorage.getItem('ss_tok'),
  isConnected: () => !!sessionStorage.getItem('ss_tok'),
  disconnect: () => { sessionStorage.removeItem('ss_tok'); sessionStorage.removeItem('ss_sheet'); },
};

const _ssGet = async path => {
  const tok = ssAuth.tok();
  if (!tok) return null;
  try {
    const r = await fetch(SS_API + path, {headers:{'Authorization':'Bearer '+tok}});
    return r.ok ? await r.json() : null;
  } catch(e) { return null; }
};

const extractSSSheetId = url => {
  if (!url) return null;
  const m = url.match(/\/sheets\/([0-9]+)/);
  if (m) return m[1];
  if (/^\d{8,}$/.test(url.trim())) return url.trim();
  return null;
};

// Auto-detect column → dashboard field mapping by column name patterns
const SS_COL_PATTERNS = [
  {field:'kickoffDate',   patterns:[/kick.?off/i,/project.?start/i]},
  {field:'installDate',   patterns:[/install/i,/deployment.?date/i]},
  {field:'goLiveTarget',  patterns:[/go.?live/i,/launch/i,/live.?date/i]},
  {field:'clientName',    patterns:[/client/i,/account/i,/company/i,/customer/i]},
  {field:'ae',            patterns:[/\bae\b/i,/account.?exec/i,/sales.?rep/i,/owner/i]},
  {field:'csm',           patterns:[/\bcsm\b/i,/customer.?success/i,/cs.?manager/i]},
  {field:'siteAddress',   patterns:[/site.?addr/i,/install.?addr/i,/location/i]},
  {field:'installerName', patterns:[/installer/i,/tech/i,/field.?team/i]},
  {field:'internalOwner', patterns:[/pm\b/i,/project.?manager/i,/internal.?owner/i,/owner/i]},
];

const detectSSMapping = columns => {
  const map = {}; // colId → dashboardField
  columns.forEach(col => {
    for (const {field, patterns} of SS_COL_PATTERNS) {
      if (patterns.some(p => p.test(col.title))) {
        if (!Object.values(map).includes(field)) { // first match wins
          map[col.id] = field;
          break;
        }
      }
    }
  });
  return map;
};

const loadSmartsheetRow = async (sheetIdOrUrl, rowId, colMapping) => {
  const sheetId = extractSSSheetId(sheetIdOrUrl) || sheetIdOrUrl;
  const sheet = await _ssGet('/sheets/' + sheetId + '?include=columnType');
  if (!sheet) return {error:'Could not load sheet. Check sheet ID/URL and token.'};
  const colMap = {}; sheet.columns.forEach(c=>{ colMap[c.id]=c.title; });
  const row = (sheet.rows||[]).find(r=>r.id===rowId);
  if (!row) return {error:'Row not found in sheet.'};
  const data = {};
  (row.cells||[]).forEach(cell=>{
    const field = colMapping[cell.columnId];
    if (field && cell.value != null && cell.value !== '') data[field] = String(cell.displayValue||cell.value);
  });
  return {success:true, data};
};

function SmartsheetAutoFill({onApply, clientName}) {
  const [conn,setConn]       = useState(ssAuth.isConnected());
  const [token,setToken]     = useState('');
  const [sheetUrl,setShUrl]  = useState(sessionStorage.getItem('ss_sheet')||'');
  const [rows,setRows]       = useState(null);   // [{id, label}]
  const [colMap,setColMap]   = useState({});
  const [status,setStatus]   = useState('idle'); // idle|loading|picking|preview|error
  const [errMsg,setErrMsg]   = useState('');
  const [preview,setPreview] = useState(null);
  const [sel,setSel]         = useState({});
  const [sheetCols,setShCols]= useState([]);

  const SS_FIELD_LABELS = {kickoffDate:'Kickoff Date',installDate:'Install Date',goLiveTarget:'Go-Live Target',clientName:'Client Name',ae:'AE',csm:'CSM',siteAddress:'Site Address',installerName:'Installer',internalOwner:'PM / Owner'};

  const doConnect = () => {
    if (!token.trim()) return;
    ssAuth.setToken(token.trim());
    setConn(true); setToken('');
  };

  const doLoadSheet = async () => {
    const sheetId = extractSSSheetId(sheetUrl) || sheetUrl.trim();
    if (!sheetId) { setErrMsg('Paste a Smartsheet URL or sheet ID'); return; }
    setStatus('loading'); setErrMsg('');
    const sheet = await _ssGet('/sheets/' + sheetId + '?include=columnType');
    if (!sheet) { setStatus('error'); setErrMsg('Could not load sheet — check URL and token'); return; }
    sessionStorage.setItem('ss_sheet', sheetUrl);
    const mapping = detectSSMapping(sheet.columns);
    setColMap(mapping);
    setShCols(sheet.columns);
    // Build row list — show primary column value + any client-name column
    const primaryCol = sheet.columns.find(c=>c.primary)||sheet.columns[0];
    const clientCol  = sheet.columns.find(c=>/client|account|company/i.test(c.title));
    const rowList = (sheet.rows||[]).map(row=>{
      const primary = row.cells.find(c=>c.columnId===primaryCol?.id);
      const client  = clientCol ? row.cells.find(c=>c.columnId===clientCol.id) : null;
      const label   = [primary?.displayValue||primary?.value, client&&client.columnId!==primaryCol?.id?client.displayValue||client.value:null].filter(Boolean).join(' · ');
      return {id:row.id, label:label||'(empty row)'};
    }).filter(r=>r.label!=='(empty row)');
    setRows(rowList); setStatus('picking');
  };

  const doPickRow = async rowId => {
    setStatus('loading');
    const result = await loadSmartsheetRow(sheetUrl, rowId, colMap);
    if (result.error) { setStatus('error'); setErrMsg(result.error); return; }
    const s={};
    Object.entries(result.data).forEach(([k,v])=>{ if(v&&String(v).trim()) s[k]=true; });
    setPreview(result.data); setSel(s); setStatus('preview');
  };

  const doApply = () => {
    const out={};
    Object.entries(preview).forEach(([k,v])=>{ if(sel[k]) out[k]=v; });
    onApply(out); setStatus('idle'); setPreview(null);
  };

  const btn = (label,onClick,style,disabled) => (
    <button onClick={onClick} disabled={!!disabled} style={{border:'none',borderRadius:8,padding:'5px 13px',fontSize:11,fontWeight:700,cursor:disabled?'not-allowed':'pointer',opacity:disabled?0.5:1,...style}}>{label}</button>
  );

  if (!conn) return (
    <div style={{marginTop:8}}>
      <div style={{fontSize:10,color:'#64748b',marginBottom:6}}>Get token: Smartsheet → avatar → <strong style={{color:'#94a3b8'}}>Personal Settings → API Access → Generate</strong></div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input value={token} onChange={e=>setToken(e.target.value)} placeholder="Paste Smartsheet API token..."
          onKeyDown={e=>e.key==='Enter'&&doConnect()}
          style={{flex:1,background:'#0f172a',border:'1px solid rgba(34,211,238,0.3)',color:'#22d3ee',fontSize:11,borderRadius:8,padding:'6px 10px',outline:'none',fontFamily:'inherit'}}/>
        {btn('Connect', doConnect, {background:'#0e7490',color:'#fff'})}
      </div>
    </div>
  );

  return (
    <div style={{marginTop:8}}>
      {(status==='idle'||status==='error'||status==='loading'||status==='picking')&&(
        <div>
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:status==='idle'?0:6}}>
            <input value={sheetUrl} onChange={e=>setShUrl(e.target.value)} placeholder="Paste Smartsheet URL or Sheet ID..."
              onKeyDown={e=>e.key==='Enter'&&doLoadSheet()}
              style={{flex:1,background:'#0f172a',border:'1px solid rgba(34,211,238,0.3)',color:'#22d3ee',fontSize:11,borderRadius:8,padding:'6px 10px',outline:'none',fontFamily:'inherit'}}/>
            {btn(status==='loading'?'⟳ Loading...':'Load Sheet', doLoadSheet, {background:'#0e7490',color:'#fff'}, status==='loading')}
            {btn('disconnect', ()=>{ssAuth.disconnect();setConn(false);setRows(null);setStatus('idle');}, {background:'transparent',color:'#334155',padding:'5px 4px',fontWeight:400})}
          </div>
          {errMsg&&<div style={{fontSize:11,color:'#f87171',marginTop:4}}>⚠️ {errMsg}</div>}
        </div>
      )}

      {status==='picking'&&rows&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&setStatus('idle')}>
          <div style={{background:'#1e293b',borderRadius:20,border:'1px solid #22d3ee',padding:24,maxWidth:480,width:'100%',maxHeight:'80vh',overflowY:'auto',boxShadow:'0 30px 60px rgba(0,0,0,0.6)'}}>
            <div style={{fontSize:15,fontWeight:900,color:'#fff',marginBottom:4}}>📋 Select Project Row</div>
            <div style={{fontSize:11,color:'#64748b',marginBottom:14}}>
              {clientName&&`Tip: look for "${clientName}"`} · {rows.length} rows found · auto-detected {Object.keys(colMap).length} field mappings
            </div>
            <div style={{borderRadius:12,overflow:'hidden',border:'1px solid #334155'}}>
              {rows.map((row,i)=>(
                <div key={row.id} onClick={()=>doPickRow(row.id)}
                  style={{padding:'10px 14px',borderBottom:i<rows.length-1?'1px solid #1e293b':'none',cursor:'pointer',background:'transparent',fontSize:12,color:'#e2e8f0',display:'flex',alignItems:'center',gap:8}}
                  onMouseOver={e=>e.currentTarget.style.background='rgba(34,211,238,0.08)'}
                  onMouseOut={e=>e.currentTarget.style.background='transparent'}>
                  <span style={{color:'#22d3ee',fontSize:10,fontWeight:700,flexShrink:0}}>#{i+1}</span>
                  {row.label}
                </div>
              ))}
              {rows.length===0&&<div style={{padding:'20px',textAlign:'center',color:'#475569',fontSize:12}}>No rows found in sheet</div>}
            </div>
            <div style={{marginTop:12,fontSize:10,color:'#475569'}}>
              Auto-mapped columns: {Object.values(SS_COL_PATTERNS.reduce((acc,{field})=>{if(Object.values(colMap).includes(field))acc[field]=true;return acc;},{})).length > 0 ? Object.entries({...SS_FIELD_LABELS}).filter(([k])=>Object.values(colMap).includes(k)).map(([,v])=>v).join(', ') : 'none detected — check column names'}
            </div>
            {btn('Cancel', ()=>setStatus('idle'), {background:'#334155',color:'#94a3b8',marginTop:10,width:'100%',padding:'8px 0',borderRadius:10})}
          </div>
        </div>
      )}

      {status==='preview'&&preview&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&setStatus('idle')}>
          <div style={{background:'#1e293b',borderRadius:20,border:'1px solid #22d3ee',padding:24,maxWidth:480,width:'100%',maxHeight:'85vh',overflowY:'auto',boxShadow:'0 30px 60px rgba(0,0,0,0.6)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div>
                <div style={{fontSize:15,fontWeight:900,color:'#fff'}}>📋 Smartsheet Data</div>
                <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Select fields to import</div>
              </div>
              {btn('✕',()=>setStatus('idle'),{background:'#334155',color:'#94a3b8',padding:'4px 10px'})}
            </div>
            <div style={{borderRadius:12,overflow:'hidden',border:'1px solid #334155',marginBottom:14}}>
              {Object.entries(SS_FIELD_LABELS).filter(([k])=>preview[k]!=null&&String(preview[k]).trim()).map(([k,label])=>(
                <div key={k} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',borderBottom:'1px solid #1e293b',background:sel[k]?'rgba(34,211,238,0.08)':'transparent',cursor:'pointer'}} onClick={()=>setSel(p=>({...p,[k]:!p[k]}))}>
                  <div style={{width:16,height:16,borderRadius:4,flexShrink:0,marginTop:2,background:sel[k]?'#0e7490':'#334155',border:'1px solid '+(sel[k]?'#22d3ee':'#475569'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:900}}>{sel[k]&&'✓'}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:sel[k]?'#22d3ee':'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{label}</div>
                    <div style={{fontSize:12,color:sel[k]?'#e2e8f0':'#64748b'}}>{preview[k]}</div>
                  </div>
                </div>
              ))}
              {Object.keys(preview).length===0&&<div style={{padding:'20px',textAlign:'center',color:'#475569',fontSize:12}}>No matching fields found. Check that column names include keywords like "Kickoff", "Install", "Go-Live".</div>}
            </div>
            <div style={{display:'flex',gap:10}}>
              <button onClick={doApply} style={{flex:1,background:'linear-gradient(135deg,#0e7490,#0891b2)',color:'#fff',border:'none',borderRadius:12,padding:'11px 0',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ✅ Apply {Object.values(sel).filter(Boolean).length} Field{Object.values(sel).filter(Boolean).length!==1?'s':''}
              </button>
              {btn('Cancel',()=>setStatus('idle'),{background:'#334155',color:'#94a3b8',borderRadius:12,padding:'11px 20px',fontSize:13,fontWeight:700})}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── SALESFORCE AUTO-FILL COMPONENT ──────────────────────────────────────────
function SFAutoFill({sfUrl, onApply}) {
  const [status,setStatus]   = useState('idle');   // idle|loading|preview|error
  const [result,setResult]   = useState(null);
  const [sel,setSel]         = useState({});
  const [conn,setConn]       = useState(sfAuth.isConnected());
  const [showToken,setShowTk]= useState(false);
  const [manInst,setManInst] = useState('');
  const [manTok,setManTok]   = useState('');
  const [tempUrl,setTempUrl] = useState('');
  const activeUrl = sfUrl || tempUrl;

  const LABELS = {clientName:'Client Name',ae:'AE',csm:'CSM',pocName:'POC Name',pocEmail:'POC Email',pocPhone:'POC Phone',siteAddress:'Site Address (Order)',shippingAddress:'Shipping Address (Order)',installDate:'Install Date',goLiveTarget:'Go-Live Target'};

  const doLoad = async () => {
    if (!activeUrl) return;
    setStatus('loading');
    const r = await loadSFOpportunity(activeUrl);
    if (r.error) { setStatus('error'); setResult({error:r.error}); return; }
    const s={};
    Object.entries(r.data).forEach(([k,v])=>{ if(v&&(typeof v==='string'?v.trim():(Array.isArray(v)?v.length>0:!!v))) s[k]=true; });
    setResult(r.data); setSel(s); setStatus('preview');
  };

  const doApply = () => {
    const out={};
    Object.entries(result).forEach(([k,v])=>{ if(sel[k]) out[k]=v; });
    onApply(out); setStatus('idle'); setResult(null);
  };

  const doConnectManual = () => {
    if (!manInst||!manTok) return;
    sfAuth.setManual(manInst, manTok);
    setConn(true); setShowTk(false); setManInst(''); setManTok('');
  };

  const btn = (label,onClick,style) => (
    <button onClick={onClick} style={{border:'none',borderRadius:8,padding:'5px 13px',fontSize:11,fontWeight:700,cursor:'pointer',...style}}>{label}</button>
  );

  if (!SF_CONFIGURED) return (
    <div style={{fontSize:10,color:'#475569',marginTop:6}}>
      ⚙️ SF auto-fill setup needed —{' '}
      <span style={{color:'#6366f1',cursor:'pointer',textDecoration:'underline'}}
        onClick={()=>alert('To enable Salesforce auto-fill:\n\n1. SF Setup → App Manager → New Connected App\n   · Callback URL: YOUR_SITE_URL\n   · OAuth Scopes: api\n   · Enable PKCE, Require Secret: OFF\n\n2. SF Setup → CORS → New\n   · Origin URL: https://vs-deployments.github.io\n\n3. In index.html, replace YOUR_SF_CLIENT_ID with the Connected App Consumer Key\n\nAlternatively, use "session token" mode — no setup required.')}>
        view instructions
      </span>
    </div>
  );

  if (!conn) return (
    <div style={{marginTop:8}}>
      {!showToken ? (
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {btn('🔗 Connect Salesforce', sfAuth.startAuth, {background:'#1d4ed8',color:'#fff'})}
          {btn('use session token', ()=>setShowTk(true), {background:'transparent',color:'#475569',padding:'5px 4px',fontWeight:400,textDecoration:'underline'})}
        </div>
      ) : (
        <div style={{background:'#0f172a',border:'1px solid #334155',borderRadius:12,padding:12,marginTop:4}}>
          <div style={{fontSize:10,color:'#64748b',marginBottom:8}}>🔐 Session credentials (stored in browser only, cleared on close)</div>
          {[['Instance URL','https://yourorg.my.salesforce.com',manInst,setManInst],['Bearer Token / Session ID','00D...!AQEAq...',manTok,setManTok]].map(([lbl,ph,val,setter])=>(
            <div key={lbl} style={{marginBottom:8}}>
              <div style={{fontSize:10,color:'#64748b',marginBottom:3}}>{lbl}</div>
              <input value={val} onChange={e=>setter(e.target.value)} placeholder={ph}
                style={{width:'100%',background:'#1e293b',border:'1px solid #334155',color:'#fff',fontSize:11,borderRadius:8,padding:'6px 10px',outline:'none',fontFamily:'inherit'}}/>
            </div>
          ))}
          <div style={{display:'flex',gap:8,marginTop:4}}>
            {btn('Connect', doConnectManual, {background:'#1d4ed8',color:'#fff'})}
            {btn('Cancel', ()=>{setShowTk(false);setManInst('');setManTok('');}, {background:'#334155',color:'#94a3b8'})}
          </div>
        </div>
      )}
    </div>
  );

  return (
    <div style={{marginTop:8}}>
      {!sfUrl && (
        <div style={{marginBottom:6}}>
          <input value={tempUrl} onChange={e=>setTempUrl(e.target.value)} placeholder="Paste Salesforce Opportunity URL to auto-fill..."
            style={{width:'100%',background:'#0f172a',border:'1px solid rgba(56,189,248,0.3)',color:'#38bdf8',fontSize:11,borderRadius:8,padding:'6px 10px',outline:'none',fontFamily:'inherit'}}/>
        </div>
      )}
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        {btn(status==='loading'?'⟳ Loading...':'⚡ Auto-fill from Salesforce', doLoad, {
          background:status==='loading'?'#334155':'linear-gradient(135deg,#1d4ed8,#6366f1)',
          color:'#fff', opacity:status==='loading'?0.7:1, cursor:status==='loading'?'wait':'pointer',
          pointerEvents:(!activeUrl||status==='loading')?'none':'auto',
          ...((!activeUrl)&&{opacity:0.4})
        })}
        {btn('disconnect', ()=>{sfAuth.disconnect();setConn(false);setStatus('idle');}, {background:'transparent',color:'#334155',padding:'5px 4px',fontWeight:400})}
      </div>
      {status==='error'&&<div style={{fontSize:11,color:'#f87171',marginTop:6}}>⚠️ {result?.error}</div>}

      {status==='preview'&&result&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.8)',zIndex:1000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}} onClick={e=>e.target===e.currentTarget&&setStatus('idle')}>
          <div style={{background:'#1e293b',borderRadius:20,border:'1px solid #6366f1',padding:24,maxWidth:520,width:'100%',maxHeight:'88vh',overflowY:'auto',boxShadow:'0 30px 60px rgba(0,0,0,0.6)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:900,color:'#fff'}}>⚡ Salesforce Auto-fill</div>
                <div style={{fontSize:11,color:'#64748b',marginTop:2}}>Select fields to import — existing values will be overwritten</div>
              </div>
              {btn('✕', ()=>setStatus('idle'), {background:'#334155',color:'#94a3b8',padding:'4px 10px'})}
            </div>

            <div style={{borderRadius:12,overflow:'hidden',border:'1px solid #334155',marginBottom:16}}>
              {Object.entries(LABELS).filter(([k])=>result[k]&&(typeof result[k]==='string'?result[k].trim():true)).map(([k,label])=>(
                <div key={k} style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',borderBottom:'1px solid #1e293b',background:sel[k]?'rgba(99,102,241,0.1)':'transparent',cursor:'pointer'}} onClick={()=>setSel(p=>({...p,[k]:!p[k]}))}>
                  <div style={{width:16,height:16,borderRadius:4,flexShrink:0,marginTop:2,background:sel[k]?'#6366f1':'#334155',border:'1px solid '+(sel[k]?'#6366f1':'#475569'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:900}}>{sel[k]&&'✓'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,color:sel[k]?'#818cf8':'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>{label}</div>
                    <div style={{fontSize:12,color:sel[k]?'#e2e8f0':'#64748b',whiteSpace:'pre-wrap',lineHeight:1.5,wordBreak:'break-word'}}>{result[k]||'—'}</div>
                  </div>
                </div>
              ))}
              {result.devices&&result.devices.length>0&&(
                <div style={{display:'flex',alignItems:'flex-start',gap:10,padding:'10px 14px',background:sel.devices?'rgba(99,102,241,0.1)':'transparent',cursor:'pointer'}} onClick={()=>setSel(p=>({...p,devices:!p.devices}))}>
                  <div style={{width:16,height:16,borderRadius:4,flexShrink:0,marginTop:2,background:sel.devices?'#6366f1':'#334155',border:'1px solid '+(sel.devices?'#6366f1':'#475569'),display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'#fff',fontWeight:900}}>{sel.devices&&'✓'}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:9,color:sel.devices?'#818cf8':'#475569',fontWeight:700,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:2}}>Devices ({result.devices.length} line items from SF)</div>
                    {result.devices.map((dv,i)=><div key={i} style={{fontSize:12,color:sel.devices?'#e2e8f0':'#64748b',lineHeight:1.6}}>{dv.type} <span style={{color:'#22d3ee',fontWeight:700}}>×{dv.qty}</span></div>)}
                  </div>
                </div>
              )}
              {Object.values({...LABELS,devices:'Devices'}).every((_,i)=>{
                const k=Object.keys({...LABELS,devices:'Devices'})[i];
                return !result[k]||(typeof result[k]==='string'?!result[k].trim():!(Array.isArray(result[k])&&result[k].length));
              })&&<div style={{padding:'20px',textAlign:'center',color:'#475569',fontSize:12}}>No data found in this Opportunity</div>}
            </div>

            <div style={{background:'rgba(99,102,241,0.08)',border:'1px solid rgba(99,102,241,0.2)',borderRadius:10,padding:'8px 12px',marginBottom:14,fontSize:11,color:'#94a3b8'}}>
              💡 <strong style={{color:'#a5b4fc'}}>Tip:</strong> Client Name, AE, POC, and Addresses come from standard SF fields. CSM + dates use{' '}
              <code style={{background:'#0f172a',padding:'1px 4px',borderRadius:4,color:'#22d3ee',fontSize:10}}>CSM__r.Name</code>,{' '}
              <code style={{background:'#0f172a',padding:'1px 4px',borderRadius:4,color:'#22d3ee',fontSize:10}}>Install_Date__c</code>, etc. —{' '}
              customize field names in <code style={{background:'#0f172a',padding:'1px 4px',borderRadius:4,color:'#fbbf24',fontSize:10}}>index.html</code> if needed.
            </div>

            <div style={{display:'flex',gap:10}}>
              <button onClick={doApply} style={{flex:1,background:'linear-gradient(135deg,#4f46e5,#7c3aed)',color:'#fff',border:'none',borderRadius:12,padding:'12px 0',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                ✅ Apply {Object.values(sel).filter(Boolean).length} Field{Object.values(sel).filter(Boolean).length!==1?'s':''}
              </button>
              {btn('Cancel', ()=>setStatus('idle'), {background:'#334155',color:'#94a3b8',borderRadius:12,padding:'12px 20px',fontSize:13,fontWeight:700})}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

                  {p.nextMilestone&&<div style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:8,padding:"5px 10px",marginBottom:10,fontSize:11,color:"#a5b4fc"}}>🎯 {p.nextMilestone}</div>}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{flex:1,background:"#0f172a",borderRadius:4,height:4}}>
                      <div style={{height:4,borderRadius:4,width:pct+"%",background:pct===100?"#10b981":"#f59e0b",transition:"width 0.3s"}}/>

                      <div style={{fontSize:9,color:"#475569",marginBottom:1}}>Direct Link</div>

                </Card>
              );
            })}
          </div>
        )}
        <div style={{textAlign:"center",fontSize:11,color:"#1e293b",marginTop:32}}>VergeSense Deployment Dashboard · Internal Use Only</div>
      </div>
    </div>
  );
}

// ─── PROJECT DASHBOARD ───

  const [linkCopied,setLinkCopied] = useState(false);
  const [newNote,setNewNote]     = useState("");
  const [newAuthor,setNewAuthor] = useState("");
  const [showAddNote,setShowAddNote] = useState(false);

  useEffect(()=>{ onSave(d); },[d]);

  const s   = k => v => setD(p=>({...p,[k]:v}));
  const sc  = SC[d.status]||SC.Green;
  const oidx = ORDER.indexOf(d.orderStatus);
  const readyArr = [d.networkReady,d.powerAvailable,d.devicesConfigured];
  const finalGo  = readyArr.every(x=>x==="Y");
  const pct = Math.round(readyArr.filter(x=>x==="Y").length/3*100);

  const addDev = () => setD(p=>({...p,devices:[...p.devices,{type:"",qty:"",shipListLink:""}]}));
  const updDev = (i,k,v) => setD(p=>{const devs=[...p.devices];devs[i]={...devs[i],[k]:v};return{...p,devices:devs};});
  const delDev = i => setD(p=>({...p,devices:p.devices.filter((_,x)=>x!==i)}));

  const saveNote = () => {
    if(!newNote.trim()) return;
    setD(p=>({...p,notes:[{id:Date.now(),author:newAuthor||"You",date:today(),text:newNote.trim(),pinned:false},...p.notes]}));
    setNewNote("");setNewAuthor("");setShowAddNote(false);
  };
  const delNote = id => setD(p=>({...p,notes:p.notes.filter(n=>n.id!==id)}));
  const pinNote = id => setD(p=>({...p,notes:p.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n)}));
  const pinned  = d.notes.filter(n=>n.pinned);
  const ini = name => name?name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase():"??";

  const addMeeting = () => setD(p=>({...p,meetingNotes:[{id:Date.now(),date:today(),title:"",body:"",source:"Granola"},...(p.meetingNotes||[])]}));
  const updMeeting = (i,k,v) => setD(p=>{const m=[...(p.meetingNotes||[])];m[i]={...m[i],[k]:v};return{...p,meetingNotes:m};});
  const delMeeting = i => setD(p=>({...p,meetingNotes:(p.meetingNotes||[]).filter((_,x)=>x!==i)}));

            </div>
          </Card>
        </div>

        {/* ── LAYER 3 ── */}
        <div style={{borderRadius:16,border:"1px solid #334155",overflow:"hidden"}}>
          <button onClick={()=>setL3open(v=>!v)} style={{width:"100%",background:"#1e293b",border:"none",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:3,height:20,background:"#475569",borderRadius:2}}/>
              <span style={{fontSize:12,fontWeight:700,color:"#94a3b8",textTransform:"uppercase",letterSpacing:"0.1em"}}>Layer 3 — Full Detail</span>
              <span style={{fontSize:11,color:"#334155"}}>Shipping · Network · Site & Install · Devices · Notes</span>
            </div>
            <span style={{fontSize:16,color:"#475569",display:"inline-block",transition:"transform 0.2s",transform:l3open?"rotate(180deg)":"rotate(0deg)"}}>▼</span>

            <div style={{padding:"16px 20px 20px",background:"#0f172a"}}>

              <div style={{borderRadius:12,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8,marginBottom:16,background:finalGo?"#052e16":"#450a0a",border:"1px solid "+(finalGo?"#166534":"#7f1d1d")}}>

                  <span style={{fontSize:18}}>{finalGo?"✅":"🚫"}</span>

                    <div style={{fontSize:15,fontWeight:900,color:finalGo?"#86efac":"#fca5a5"}}>{finalGo?"GO — Ready":"NO GO — Action Required"}</div>
                  </div>
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>

                ))}

              {/* SHIPPING */}

                    <SL>🚚 Shipping Tracking</SL>

                      {[{label:"Shipped",key:"shipped",yn:true},{label:"Carrier",key:"shipCarrier",color:"#fff"},{label:"Delivery",key:"deliveryDate",color:"#fbbf24"}].map(({label,key,color,yn})=>(
                        <div key={label} style={{background:"rgba(51,65,85,0.4)",borderRadius:10,padding:10}}>
                          <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>{label}</div>
                          {yn&&edit?<YN val={d[key]} set={s(key)} size="small"/>:edit?<EI value={d[key]} onChange={s(key)} style={{color:color||"#fff",fontWeight:600,fontSize:12}}/>:yn?<div style={{fontSize:12,fontWeight:700,color:d[key]==="Y"?"#34d399":"#f87171"}}>{d[key]==="Y"?"Yes":"No"}</div>:<div style={{fontSize:12,fontWeight:700,color:color||"#fff"}}>{d[key]||"—"}</div>}
                        </div>

                        <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>Tracking #</div>
                        {edit?<div><EI value={d.trackingNumber} onChange={s("trackingNumber")} style={{color:"#22d3ee",fontWeight:600,fontSize:12,marginBottom:2}}/><EI value={d.trackingLink} onChange={s("trackingLink")} style={{color:"#818cf8",fontSize:10}}/></div>

                  <Card>

                    <div style={{fontSize:11,color:"#64748b",marginBottom:4}}>Attn / Receiving</div>
                    {edit?<EI value={d.shippingAttn} onChange={s("shippingAttn")} style={{color:"#c4b5fd",fontWeight:600}}/>:<div style={{fontSize:12,fontWeight:600,color:"#c4b5fd"}}>{d.shippingAttn||"—"}</div>}
                  </Card>
                </div>

              {/* NETWORK */}
              {dtab==="network"&&(
                <div style={g2}>

                      {edit?<textarea value={d.siteAddress||""} onChange={e=>s("siteAddress")(e.target.value)} rows={2} style={{...ta,background:"transparent",border:"none",borderBottom:"1px dashed #475569",borderRadius:0,padding:"2px 0"}}/>:<div style={{color:"#fff",fontSize:13,lineHeight:1.6,whiteSpace:"pre-line"}}>{d.siteAddress||"—"}</div>}
                    </div>
                    <SL>🏗️ Site Conditions</SL>
                    {[{l:"PPE",k:"ppe"},{l:"Union Rules",k:"unionRules"},{l:"Work Hours",k:"workHours"},{l:"Ceiling Type",k:"ceilingType"},{l:"Mounting Type",k:"mountingType"}].map(({l,k})=>(
                      <div key={k} style={iRow}><span style={iLbl}>{l}</span>{edit?<EI value={d[k]} onChange={s(k)} style={{color:"#e2e8f0",textAlign:"right",fontSize:12}}/>:<span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{d[k]||"—"}</span>}</div>
                    ))}
                    <div style={iRow}><span style={iLbl}>COI Required</span>{edit?<YN val={d.coiRequired} set={s("coiRequired")} size="small"/>:<span style={{fontSize:12,fontWeight:600,color:d.coiRequired==="Y"?"#fbbf24":"#64748b"}}>{d.coiRequired==="Y"?"Yes":"No"}</span>}</div>
                    <div style={iRow}><span style={iLbl}>Site Survey</span>{edit?<EI value={d.siteSurveyLink} onChange={s("siteSurveyLink")} style={{color:"#818cf8",textAlign:"right",fontSize:12}}/>:d.siteSurveyLink?<a href={d.siteSurveyLink} target="_blank" rel="noreferrer" style={{fontSize:12,fontWeight:600,color:"#818cf8",textDecoration:"underline"}}>View ↗</a>:<span style={{fontSize:12,color:"#334155"}}>Not added</span>}</div>
                  </Card>
                  <Card>
                    <SL>🔑 Access Contact</SL>
                    <div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(51,65,85,0.4)",borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#f59e0b,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,flexShrink:0}}>{ini(d.accessName)}</div>
                      <div style={{flex:1,minWidth:0}}>
                        {edit?<EI value={d.accessName} onChange={s("accessName")} style={{color:"#fff",fontWeight:700}}/>:<div style={{fontWeight:700,color:"#fff",fontSize:13}}>{d.accessName||"—"}</div>}
                        {edit?<EI value={d.accessEmail} onChange={s("accessEmail")} style={{color:"#94a3b8",fontSize:11}}/>:<div style={{color:"#94a3b8",fontSize:11}}>{d.accessEmail||"—"}</div>}
                        {edit?<EI value={d.accessPhone} onChange={s("accessPhone")} style={{color:"#fbbf24",fontSize:12}}/>:<div style={{color:"#fbbf24",fontSize:12,fontWeight:600}}>{d.accessPhone||"—"}</div>}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Access Type</div>
                      {edit?<select value={d.accessType} onChange={e=>s("accessType")(e.target.value)} style={sel}><option>Badge Access</option><option>Escort</option><option>Other</option></select>:<span style={{padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700,background:d.accessType==="Badge Access"?"rgba(5,46,22,0.8)":"rgba(120,53,15,0.8)",color:d.accessType==="Badge Access"?"#34d399":"#fcd34d"}}>{d.accessType==="Badge Access"?"🪪":"👮"} {d.accessType}</span>}
                    </div>
                    <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>Access Notes</div>
                    {edit?<textarea value={d.accessNote||""} onChange={e=>s("accessNote")(e.target.value)} rows={2} style={ta}/>:<div style={{fontSize:12,color:"#cbd5e1",background:"rgba(51,65,85,0.4)",borderRadius:8,padding:"8px 10px"}}>{d.accessNote||"—"}</div>}
                    <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #334155"}}>
                      <SL>🔧 Installation</SL>
                      <div style={iRow}><span style={iLbl}>Installer</span>{edit?<EI value={d.installerName} onChange={s("installerName")} style={{color:"#67e8f9",textAlign:"right",fontSize:12}}/>:<span style={{fontSize:12,fontWeight:600,color:"#67e8f9"}}>{d.installerName||"—"}</span>}</div>
                      {[{l:"Self Install",k:"selfInstall"},{l:"Construction Site",k:"construction"},{l:"Added to Install Tool",k:"addedToInstallTool"}].map(({l,k})=>(
                        <div key={k} style={iRow}><span style={iLbl}>{l}</span>{edit?<YN val={d[k]} set={s(k)} size="small"/>:<span style={{fontSize:11,fontWeight:700,color:d[k]==="Y"?"#34d399":"#64748b"}}>{d[k]==="Y"?"Yes":"No"}</span>}</div>
                      ))}
                      {d.whatsappLink&&<div style={{marginTop:10}}><a href={d.whatsappLink} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(5,46,22,0.6)",border:"1px solid #166534",borderRadius:10,padding:"8px 14px",color:"#4ade80",fontWeight:700,fontSize:12}}><span style={{fontSize:16}}>💬</span> Open WhatsApp Chat ↗</a></div>}
                      {edit&&<div style={{marginTop:8}}><div style={{fontSize:10,color:"#64748b",marginBottom:4}}>WhatsApp Link</div><EI value={d.whatsappLink} onChange={s("whatsappLink")} style={{color:"#4ade80",fontSize:12}}/></div>}
                    </div>
                  </Card>

              {/* DEVICES */}
              {dtab==="devices"&&(
                <Card>
                  <SL>📦 Order Progress</SL>
                  <div style={{display:"flex",alignItems:"flex-start",marginBottom:16}}>
                    {ORDER.map((step,i)=>(
                      <div key={step} style={{display:"flex",alignItems:"center",flex:1}}>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                          <button onClick={()=>edit&&s("orderStatus")(step)} style={{width:26,height:26,borderRadius:"50%",border:"none",cursor:edit?"pointer":"default",fontWeight:900,fontSize:10,background:i<=oidx?OCOL[i]:"#334155",color:i<=oidx?"#fff":"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>{i<oidx?"✓":i+1}</button>
                          <div style={{fontSize:9,marginTop:3,textAlign:"center",fontWeight:i===oidx?700:400,color:i===oidx?"#fff":"#64748b",lineHeight:1.2}}>{step}</div>
                        </div>
                        {i<ORDER.length-1&&<div style={{height:1,flex:1,marginBottom:14,background:i<oidx?"#6366f1":"#334155"}}/>}
                      </div>
                    ))}
                  </div>
                  <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #334155",marginBottom:10}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{background:"rgba(51,65,85,0.5)"}}>{["Device","Qty","Ship List",""].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {d.devices.map((dv,i)=>(
                          <tr key={i} style={{borderTop:"1px solid #334155"}}>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.type} onChange={v=>updDev(i,"type",v)} style={{color:"#fff",fontWeight:600}}/>:<span style={{color:"#fff",fontWeight:600}}>{dv.type||"—"}</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.qty} onChange={v=>updDev(i,"qty",v)} style={{color:"#22d3ee",fontWeight:700,width:40}}/>:<span style={{color:"#22d3ee",fontWeight:700}}>{dv.qty||"—"}</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.shipListLink} onChange={v=>updDev(i,"shipListLink",v)} style={{color:"#818cf8",fontSize:11}}/>:dv.shipListLink?<a href={dv.shipListLink} target="_blank" rel="noreferrer" style={{color:"#818cf8",textDecoration:"underline",fontSize:11}}>View ↗</a>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit&&<button onClick={()=>delDev(i)} style={{background:"transparent",border:"none",color:"#475569",fontSize:14,cursor:"pointer"}} onMouseOver={e=>e.target.style.color="#ef4444"} onMouseOut={e=>e.target.style.color="#475569"}>×</button>}</td>
                          </tr>
                        ))}
                        {d.devices.length===0&&<tr><td colSpan={4} style={{padding:"16px 12px",textAlign:"center",color:"#334155",fontSize:12}}>No devices added</td></tr>}
                      </tbody>
                    </table>
                  </div>
                  {edit&&<button onClick={addDev} style={{background:"transparent",border:"none",color:"#818cf8",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add device row</button>}
                </Card>
              )}

              {/* NOTES */}
              {dtab==="notes"&&(
                <div style={{maxWidth:700}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <SL>📝 Project Notes</SL>
                    <button onClick={()=>setShowAddNote(v=>!v)} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{showAddNote?"✕ Cancel":"+ Add Note"}</button>
                  </div>
                  {showAddNote&&(
                    <Card style={{marginBottom:12}}>
                      <input value={newAuthor} onChange={e=>setNewAuthor(e.target.value)} placeholder="Your name (optional)" style={{width:"100%",background:"#334155",border:"1px solid #475569",color:"#fff",fontSize:12,borderRadius:8,padding:"8px 12px",outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
                      <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Type your note..." rows={3} style={{...ta,marginBottom:8}}/>
                      <button onClick={saveNote} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save Note</button>
                    </Card>
                  )}
                  {d.notes.length===0&&<div style={{textAlign:"center",color:"#334155",padding:"32px 0",fontSize:13}}>No notes yet.</div>}
                  {[...d.notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)).map(n=>(
                    <div key={n.id} style={{borderRadius:14,padding:14,marginBottom:10,border:"1px solid "+(n.pinned?"#92400e":"#334155"),background:n.pinned?"rgba(120,53,15,0.2)":"#1e293b"}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0}}>{ini(n.author)}</div>
                          <div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{n.author}</div><div style={{fontSize:10,color:"#64748b"}}>{n.date}</div></div>
                          {n.pinned&&<span>📌</span>}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>pinNote(n.id)} style={{background:n.pinned?"rgba(120,53,15,0.6)":"#334155",color:n.pinned?"#fcd34d":"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{n.pinned?"Unpin":"Pin"}</button>
                          <button onClick={()=>delNote(n.id)} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Delete</button>
                        </div>
                      </div>
                      <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6}}>{n.text}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App() {
  const [projects,setProjects] = useState([]);
  const [activeId,setActiveId] = useState(null);
  const [loading,setLoading]   = useState(true);
  const [syncing,setSyncing]   = useState(false);

  useEffect(()=>{
    const init = async () => {
      setLoading(true);
      // Handle Salesforce OAuth redirect (PKCE code exchange)
      if (new URL(window.location.href).searchParams.has('code')) {
        await sfAuth.handleCallback();
      }
      try{ const c=localStorage.getItem("vs_projects"); if(c) setProjects(JSON.parse(c)); }catch(e){}
      let hashId=null;
      try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) hashId=h.replace("#project-",""); }catch(e){}
      const live = await api.getAll();
      if(live&&live.length>0){
        setProjects(live);
        try{ localStorage.setItem("vs_projects",JSON.stringify(live)); }catch(e){}
        if(hashId&&live.find(p=>p.id===hashId)) setActiveId(hashId);
      } else {
        try{ const c=localStorage.getItem("vs_projects"); if(c){ const list=JSON.parse(c); setProjects(list); if(hashId&&list.find(p=>p.id===hashId)) setActiveId(hashId); } }catch(e){}
      }
      setLoading(false);
    };
    init();
  },[]);

  useEffect(()=>{
    try{ if(activeId) window.location.hash="project-"+activeId; else window.location.hash=""; }catch(e){}
  },[activeId]);

  useEffect(()=>{
    const onHash=()=>{ try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) setActiveId(h.replace("#project-","")); else setActiveId(null); }catch(e){} };
    window.addEventListener("hashchange",onHash);
    return()=>window.removeEventListener("hashchange",onHash);
  },[]);

  const createProject = async (clientName,siteName,floorName) => {
    const p = BLANK(clientName,siteName,floorName);
    const updated = [p,...projects];
    setProjects(updated);
    try{ localStorage.setItem("vs_projects",JSON.stringify(updated)); }catch(e){}
    setSyncing(true); await api.save(p); setSyncing(false);
    setActiveId(p.id);
  };

  const saveProject = async updated => {
    const list = projects.map(p=>p.id===updated.id?updated:p);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.save(updated);
  };

  const deleteProject = async id => {
    const list = projects.filter(p=>p.id!==id);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.del(id);
    if(activeId===id) setActiveId(null);
  };

  const active = projects.find(p=>p.id===activeId)||null;

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>⚡</div>
      <div style={{fontSize:14,color:"#6366f1",fontWeight:700}}>Loading VergeSense Dashboard...</div>
      <div style={{fontSize:12,color:"#334155"}}>Syncing with Google Sheets</div>
    </div>
  );

  if(active) return <ProjectDashboard project={active} onSave={saveProject} onBack={()=>setActiveId(null)} syncing={syncing}/>;
  return <ProjectList projects={projects} onOpen={setActiveId} onCreate={createProject} onDelete={deleteProject} syncing={syncing}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
