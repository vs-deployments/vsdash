<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VergeSense Deployment Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#fff;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
input,textarea,select{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const SITE_URL = "https://vs-deployments.github.io/vsdash/";
const API_URL = "https://script.google.com/macros/s/AKfycbx7oz6HpMBxjdarV1LOYtlLDqbq2nJJaJtjsyK10q51vVDVCk-fjSAVk3bSNkutfDI/exec";
const slugify = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const getProjectUrl = id => SITE_URL + "#project-" + id;
const today = () => new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

const api = {
  getAll: async () => {
    try { const r=await fetch(API_URL+"?action=getAll"); const j=await r.json(); return j.success?j.projects:[]; } catch(e){ return []; }
  },
  save: async (project) => {
    try { const r=await fetch(API_URL+"?action=save&data="+encodeURIComponent(JSON.stringify(project))); return true; } catch(e){ return false; }
  },
  delete: async (id) => {
    try { await fetch(API_URL+"?action=delete&id="+encodeURIComponent(id)); return true; } catch(e){ return false; }
  }
};

const BLANK = (clientName="", siteName="", floorName="") => ({
  id: slugify((clientName||"new")+"-"+(siteName||"site")+"-"+(floorName||""))+"-"+Date.now(),
  clientName, siteName, floorName,
  projectPhase:"Pre-Install", status:"Green",
  internalOwner:"", nextMilestone:"",
  installDate:"", goLiveTarget:"",
  blockerPresent:"N", blockerText:"",
  escalation:"N", lastUpdated:today(),
  // Client deliverables
  metadataReceived:"N", floorPlansReceived:"N", networkConfirmed:"N",
  coiSubmitted:"N", shippingInfoConfirmed:"N",
  // Internal deliverables
  orderActivated:"N", mapDigitized:"N",
  techAssigned:"N", whatsappCreated:"N", installScheduled:"N",
  validationRequested:"N", csHandoff:"N",
  // Dates
  kickoffDate:"", lastClientTouchpoint:"", lastInternalUpdate:"",
  blockerWhat:"", blockerOwner:"", blockerSince:"",
  // Layer 3
  projectType:"New Deployment", salesforceLink:"",
  pocName:"", pocEmail:"", pocPhone:"",
  orderStatus:"Ordered", devices:[], wifiConfigRequired:"N",
  siteAddress:"", shippingAddress:"", shippingAttn:"",
  shipped:"N", shipCarrier:"", trackingNumber:"", trackingLink:"", deliveryDate:"",
  networkType:"WiFi", wifiConfigsReceived:"N",
  coiRequired:"N", ppe:"", unionRules:"", workHours:"",
  accessType:"Badge Access", accessName:"", accessEmail:"", accessPhone:"", accessNote:"",
  siteSurveyLink:"", ceilingType:"", mountingType:"",
  networkReady:"N", powerAvailable:"N", devicesConfigured:"N", usbRequired:"N",
  installerName:"", selfInstall:"N", construction:"N",
  addedToInstallTool:"N", whatsappLink:"",
  risks:"", nextSteps:"", notes:[],
});

const SC = {
  Green:  {bg:"#10b981",dot:"#34d399",ring:"#34d399",label:"On Track"},
  Yellow: {bg:"#f59e0b",dot:"#fbbf24",ring:"#fbbf24",label:"At Risk"},
  Red:    {bg:"#ef4444",dot:"#f87171",ring:"#f87171",label:"Blocked"},
};
const PHASES = ["Pre-Install","Kickoff","In Progress","Installing","Validation","Go-Live","Complete"];
const ORDER  = ["Ordered","Shipped","Delivered","Client Confirmed","Installed"];
const OCOL   = ["#8b5cf6","#3b82f6","#06b6d4","#f59e0b","#10b981"];

const YN = ({val,set,size="normal"}) => (
  <div style={{display:"flex",gap:3}}>
    {["Y","N"].map(o=>(
      <button key={o} onClick={()=>set(o)}
        style={{width:size==="small"?26:32,height:size==="small"?22:28,borderRadius:6,border:"none",
          fontWeight:700,fontSize:size==="small"?10:11,cursor:"pointer",
          background:val===o?(o==="Y"?"#10b981":"#ef4444"):"#334155",
          color:val===o?"#fff":"#94a3b8"}}>
        {o}
      </button>
    ))}
  </div>
);

const EI = ({value,onChange,style,placeholder}) => (
  <input value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""}
    style={{background:"transparent",border:"none",borderBottom:"1px dashed #475569",
      color:"inherit",fontSize:13,width:"100%",outline:"none",padding:"2px 0",...(style||{})}}/>
);

const Card = ({children,style}) => (
  <div style={{background:"#1e293b",borderRadius:16,border:"1px solid #334155",padding:16,...(style||{})}}>{children}</div>
);
const SL = ({children,color}) => (
  <div style={{fontSize:11,color:color||"#64748b",textTransform:"uppercase",letterSpacing:"0.1em",fontWeight:700,marginBottom:10}}>{children}</div>
);

const DelivCheck = ({label,val,set}) => (
  <div style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid #1e293b",cursor:"pointer"}} onClick={()=>set(val==="Y"?"N":"Y")}>
    <div style={{width:16,height:16,borderRadius:4,flexShrink:0,
      background:val==="Y"?"#10b981":"#334155",border:"1px solid "+(val==="Y"?"#10b981":"#475569"),
      display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,color:"#fff",fontWeight:700}}>
      {val==="Y"&&"✓"}
    </div>
    <span style={{fontSize:12,color:val==="Y"?"#94a3b8":"#cbd5e1",textDecoration:val==="Y"?"line-through":"none"}}>{label}</span>
  </div>
);

function CopyLinkBtn({projectId}) {
  const [copied,setCopied]=useState(false);
  const copy=e=>{
    e&&e.stopPropagation();
    const url=getProjectUrl(projectId);
    const fb=()=>{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);};
    if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{}).catch(fb); else fb();
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };
  return(
    <button onClick={copy} style={{background:copied?"#10b981":"#334155",color:copied?"#fff":"#94a3b8",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>
      {copied?"✅ Copied!":"🔗 Copy Link"}
    </button>
  );
}

// ── PROJECT LIST ──
function ProjectList({projects,onOpen,onCreate,onDelete,syncing}) {
  const [showNew,setShowNew]=useState(false);
  const [name,setName]=useState("");
  const [site,setSite]=useState("");
  const [floor,setFloor]=useState("");

  const handleCreate=()=>{
    if(!name.trim())return;
    onCreate(name.trim(),site.trim(),floor.trim());
    setName("");setSite("");setFloor("");setShowNew(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0f172a",padding:24}}>
      <div style={{maxWidth:1000,margin:"0 auto"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28,flexWrap:"wrap",gap:16}}>
          <div>
            <div style={{fontSize:24,fontWeight:900,color:"#fff",marginBottom:4}}>⚡ VergeSense <span style={{color:"#6366f1"}}>Deployments</span></div>
            <div style={{fontSize:12,color:"#475569"}}>All Projects · One Place</div>
            {syncing&&<div style={{fontSize:11,color:"#6366f1",marginTop:2}}>⟳ Syncing...</div>}
          </div>
          <button onClick={()=>setShowNew(v=>!v)} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:12,padding:"10px 24px",fontSize:13,fontWeight:700,cursor:"pointer"}}>
            {showNew?"✕ Cancel":"+ New Project"}
          </button>
        </div>

        {showNew&&(
          <Card style={{marginBottom:24,border:"1px solid #6366f1"}}>
            <SL>🆕 New Project</SL>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:16}}>
              {[["Client Name",name,setName,"e.g. Acme Corp"],["Site Name",site,setSite,"e.g. HQ"],["Floor",floor,setFloor,"e.g. Floor 12"]].map(([lbl,val,setter,ph])=>(
                <div key={lbl}>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:6,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>{lbl}</div>
                  <input value={val} onChange={e=>setter(e.target.value)} placeholder={ph} onKeyDown={e=>e.key==="Enter"&&handleCreate()}
                    style={{width:"100%",background:"#0f172a",border:"1px solid #334155",color:"#fff",fontSize:13,borderRadius:8,padding:"8px 12px",outline:"none",fontFamily:"inherit"}}/>
                </div>
              ))}
            </div>
            <button onClick={handleCreate} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontSize:13,fontWeight:700,cursor:"pointer"}}>Create Dashboard →</button>
          </Card>
        )}

        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:24}}>
          {[{l:"Total",v:projects.length,c:"#818cf8"},{l:"On Track",v:projects.filter(p=>p.status==="Green").length,c:"#34d399"},
            {l:"At Risk",v:projects.filter(p=>p.status==="Yellow").length,c:"#fbbf24"},{l:"Blocked",v:projects.filter(p=>p.status==="Red").length,c:"#f87171"}].map(({l,v,c})=>(
            <Card key={l} style={{textAlign:"center",padding:16}}>
              <div style={{fontSize:28,fontWeight:900,color:c,marginBottom:4}}>{v}</div>
              <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.05em"}}>{l}</div>
            </Card>
          ))}
        </div>

        {projects.length===0?(
          <Card style={{textAlign:"center",padding:48}}>
            <div style={{fontSize:40,marginBottom:16}}>📋</div>
            <div style={{fontSize:16,fontWeight:700,color:"#fff",marginBottom:8}}>No projects yet</div>
            <div style={{fontSize:13,color:"#475569"}}>Click "+ New Project" to get started</div>
          </Card>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:16}}>
            {projects.map(p=>{
              const sc=SC[p.status]||SC.Green;
              const pct=Math.round([p.networkReady,p.powerAvailable,p.devicesConfigured].filter(x=>x==="Y").length/3*100);
              return(
                <Card key={p.id} style={{cursor:"pointer"}} onClick={()=>onOpen(p.id)}>
                  <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                        <div style={{width:10,height:10,borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                        <div style={{fontSize:15,fontWeight:800,color:"#fff",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.clientName||"Unnamed"}</div>
                      </div>
                      <div style={{fontSize:12,color:"#6366f1",fontWeight:600,marginBottom:2}}>{p.siteName||"—"}{p.floorName?" · "+p.floorName:""}</div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:4}}>
                        <span style={{fontSize:10,background:"#1e3a5f",color:"#93c5fd",borderRadius:6,padding:"2px 8px",fontWeight:600}}>{p.projectPhase||"Pre-Install"}</span>
                        <span style={{fontSize:10,background:sc.bg,color:"#fff",borderRadius:6,padding:"2px 8px",fontWeight:700}}>{sc.label}</span>
                        {p.blockerPresent==="Y"&&<span style={{fontSize:10,background:"#450a0a",color:"#f87171",borderRadius:6,padding:"2px 8px",fontWeight:700}}>🚨 Blocked</span>}
                        {p.escalation==="Y"&&<span style={{fontSize:10,background:"#451a03",color:"#fbbf24",borderRadius:6,padding:"2px 8px",fontWeight:700}}>⚠️ Escalated</span>}
                      </div>
                    </div>
                    <button onClick={e=>{e.stopPropagation();window.confirm("Delete this project?")&&onDelete(p.id);}}
                      style={{background:"transparent",border:"none",color:"#334155",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}
                      onMouseOver={e=>e.target.style.color="#ef4444"} onMouseOut={e=>e.target.style.color="#334155"}>×</button>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
                    {[{l:"Install Date",v:p.installDate||"TBD",c:"#fbbf24"},{l:"Go-Live",v:p.goLiveTarget||"TBD",c:"#34d399"},
                      {l:"Owner",v:p.internalOwner||"—",c:"#94a3b8"},{l:"Phase",v:p.projectPhase||"Pre-Install",c:"#93c5fd"}].map(({l,v,c})=>(
                      <div key={l} style={{background:"#0f172a",borderRadius:8,padding:"5px 8px"}}>
                        <div style={{fontSize:9,color:"#475569",marginBottom:1}}>{l}</div>
                        <div style={{fontSize:11,fontWeight:700,color:c,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{v}</div>
                      </div>
                    ))}
                  </div>
                  {p.nextMilestone&&<div style={{background:"rgba(99,102,241,0.1)",border:"1px solid rgba(99,102,241,0.3)",borderRadius:8,padding:"5px 10px",marginBottom:10,fontSize:11,color:"#a5b4fc"}}>🎯 {p.nextMilestone}</div>}
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                    <div style={{flex:1,background:"#0f172a",borderRadius:4,height:4}}>
                      <div style={{height:4,borderRadius:4,width:pct+"%",background:pct===100?"#10b981":"#f59e0b",transition:"width 0.3s"}}/>
                    </div>
                    <span style={{fontSize:10,fontWeight:700,color:pct===100?"#34d399":"#fbbf24",flexShrink:0}}>{pct}% ready</span>
                  </div>
                  <div style={{borderTop:"1px solid #334155",paddingTop:8,display:"flex",alignItems:"center",gap:8}} onClick={e=>e.stopPropagation()}>
                    <div style={{flex:1,background:"#0f172a",borderRadius:8,padding:"5px 8px",overflow:"hidden"}}>
                      <div style={{fontSize:9,color:"#475569",marginBottom:1}}>Direct Link</div>
                      <div style={{fontSize:9,color:"#818cf8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{getProjectUrl(p.id)}</div>
                    </div>
                    <CopyLinkBtn projectId={p.id}/>
                  </div>
                </Card>
              );
            })}
          </div>
        )}
        <div style={{textAlign:"center",fontSize:11,color:"#1e293b",marginTop:32}}>VergeSense Deployment Dashboard · Internal Use Only</div>
      </div>
    </div>
  );
}

// ── PROJECT DASHBOARD ──
function ProjectDashboard({project,onSave,onBack,syncing}) {
  const [d,setD]=useState(project);
  const [edit,setEdit]=useState(false);
  const [detailTab,setDetailTab]=useState("shipping");
  const [layer3Open,setLayer3Open]=useState(false);
  const [linkCopied,setLinkCopied]=useState(false);
  const [newNote,setNewNote]=useState("");
  const [newAuthor,setNewAuthor]=useState("");
  const [showAddNote,setShowAddNote]=useState(false);

  useEffect(()=>{ onSave(d); },[d]);

  const s=k=>v=>setD(p=>({...p,[k]:v}));
  const sc=SC[d.status]||SC.Green;
  const oidx=ORDER.indexOf(d.orderStatus);
  const readyArr=[d.networkReady,d.powerAvailable,d.devicesConfigured];
  const finalGo=readyArr.every(x=>x==="Y");
  const pct=Math.round(readyArr.filter(x=>x==="Y").length/3*100);

  const addDev=()=>setD(p=>({...p,devices:[...p.devices,{type:"",qty:"",shipListLink:""}]}));
  const updDev=(i,k,v)=>setD(p=>{const devs=[...p.devices];devs[i]={...devs[i],[k]:v};return{...p,devices:devs};});
  const delDev=i=>setD(p=>({...p,devices:p.devices.filter((_,x)=>x!==i)}));

  const saveNote=()=>{
    if(!newNote.trim())return;
    setD(p=>({...p,notes:[{id:Date.now(),author:newAuthor||"You",date:today(),text:newNote.trim(),pinned:false},...p.notes]}));
    setNewNote("");setNewAuthor("");setShowAddNote(false);
  };
  const delNote=id=>setD(p=>({...p,notes:p.notes.filter(n=>n.id!==id)}));
  const pinNote=id=>setD(p=>({...p,notes:p.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n)}));
  const pinned=d.notes.filter(n=>n.pinned);
  const initials=name=>name?name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase():"??";

  const copyLink=()=>{
    const url=getProjectUrl(d.id);
    const fb=()=>{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);};
    if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{}).catch(fb); else fb();
    setLinkCopied(true); setTimeout(()=>setLinkCopied(false),2500);
  };

  const clientDelivs  = {metadataReceived:"Metadata received",floorPlansReceived:"Floor plans received",networkConfirmed:"Network confirmed",coiSubmitted:"COI submitted",shippingInfoConfirmed:"Shipping info confirmed"};
  const internalDelivs = {orderActivated:"Order activated",mapDigitized:"Map digitized",techAssigned:"Tech assigned",whatsappCreated:"WhatsApp created",installScheduled:"Install scheduled",validationRequested:"Validation requested",csHandoff:"CS handoff"};
  const clientPct  = Math.round(Object.keys(clientDelivs).filter(k=>d[k]==="Y").length/Object.keys(clientDelivs).length*100);
  const internalPct= Math.round(Object.keys(internalDelivs).filter(k=>d[k]==="Y").length/Object.keys(internalDelivs).length*100);

  const taStyle={background:"#334155",border:"1px solid #475569",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none",padding:"8px 12px",borderRadius:8,resize:"none",fontFamily:"inherit"};
  const selStyle={background:"#334155",border:"1px solid #475569",color:"#fff",fontSize:13,width:"100%",outline:"none",padding:"8px 12px",borderRadius:8,fontFamily:"inherit"};
  const iRow={display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #334155",gap:12};
  const iLbl={fontSize:11,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0};

  // Layer 3 tabs — Site+Install combined, separate Notes tab
  const DETAIL_TABS=[
    {id:"shipping",   label:"📦 Shipping"},
    {id:"network",    label:"🌐 Network"},
    {id:"site",       label:"🏗️ Site & Install"},
    {id:"devices",    label:"🖥️ Devices"},
    {id:"notes",      label:"📝 Notes"+(d.notes.length>0?" ("+d.notes.length+")":"")},
  ];

  return(
    <div style={{minHeight:"100vh",background:"#0f172a"}}>

      {/* TOPBAR */}
      <div style={{borderBottom:"1px solid #1e293b",padding:"10px 20px",background:"#0f172a",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={onBack} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>← All Projects</button>
            <div style={{width:10,height:10,borderRadius:"50%",background:sc.dot,boxShadow:"0 0 0 2px "+sc.ring}}/>
            {edit?(
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                <EI value={d.clientName} onChange={s("clientName")} style={{color:"#fff",fontWeight:900,fontSize:14,width:110}}/>
                <span style={{color:"#475569"}}>·</span>
                <EI value={d.siteName} onChange={s("siteName")} style={{color:"#818cf8",fontWeight:900,fontSize:14,width:110}}/>
                <span style={{color:"#475569"}}>·</span>
                <EI value={d.floorName} onChange={s("floorName")} style={{color:"#94a3b8",fontSize:12,width:80}}/>
              </div>
            ):(
              <div style={{fontSize:15,fontWeight:900}}>
                {d.clientName||"New Project"}<span style={{color:"#475569",margin:"0 4px"}}>·</span>
                <span style={{color:"#818cf8"}}>{d.siteName}</span>
                {d.floorName&&<span style={{color:"#64748b",fontWeight:400,fontSize:13}}> · {d.floorName}</span>}
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {syncing&&<span style={{fontSize:11,color:"#6366f1"}}>⟳ Saving...</span>}
            <button onClick={copyLink} style={{background:linkCopied?"#10b981":"#0f172a",color:linkCopied?"#fff":"#818cf8",border:"1px solid "+(linkCopied?"#10b981":"#6366f1"),borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>
              {linkCopied?"✅ Copied!":"🔗 Copy Project Link"}
            </button>
            {pinned.length>0&&<div style={{background:"#451a03",border:"1px solid #92400e",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#fcd34d",fontWeight:700}}>📌 {pinned.length}</div>}
            <div style={{background:sc.bg,color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:900}}>{sc.label}</div>
            <button onClick={()=>setEdit(e=>!e)} style={{background:edit?"#4f46e5":"#1e293b",color:edit?"#fff":"#94a3b8",border:"1px solid "+(edit?"#6366f1":"#334155"),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>
              {edit?"✏️ Done":"✏️ Edit"}
            </button>
          </div>
        </div>
      </div>

      {linkCopied&&<div style={{background:"#10b981",padding:"8px",textAlign:"center",fontSize:12,fontWeight:700,color:"#fff"}}>✅ Link copied! Paste into your Google Drive project folder.</div>}

      <div style={{maxWidth:1200,margin:"0 auto",padding:"20px"}}>

        {/* ── LAYER 1: EXECUTIVE ── */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:3,height:20,background:"#6366f1",borderRadius:2}}/>
          <span style={{fontSize:12,fontWeight:700,color:"#6366f1",textTransform:"uppercase",letterSpacing:"0.1em"}}>Layer 1 — Executive View</span>

            <div style={{background:d.blockerPresent==="Y"?"rgba(239,68,68,0.1)":"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid "+(d.blockerPresent==="Y"?"rgba(239,68,68,0.4)":"rgba(99,102,241,0.2)")}}>

            {/* Escalation */}
            <div style={{background:d.escalation==="Y"?"rgba(245,158,11,0.1)":"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid "+(d.escalation==="Y"?"rgba(245,158,11,0.4)":"rgba(99,102,241,0.2)")}}>

              {label:"Target Go-Live",      key:"goLiveTarget",         color:"#34d399"},

                      <span style={{fontSize:12,color:"#fca5a5"}}>{line.replace(/^[•\-]\s*/,"")}</span>

            <div>
              <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Next Steps</div>
              {edit?<textarea value={d.nextSteps||""} onChange={e=>s("nextSteps")(e.target.value)} rows={4} style={taStyle}/>

                      <span style={{fontSize:12,color:"#c7d2fe"}}>{line.replace(/^[•\-]\s*/,"")}</span>

                  ))}{!d.nextSteps&&<div style={{fontSize:12,color:"#334155"}}>None added</div>}</div>}

                      {edit?<textarea value={d.siteAddress||""} onChange={e=>s("siteAddress")(e.target.value)} rows={2} style={{...taStyle,background:"transparent",border:"none",borderBottom:"1px dashed #475569",borderRadius:0,padding:"2px 0"}}/>
                           :<div style={{color:"#fff",fontSize:13,lineHeight:1.6,whiteSpace:"pre-line"}}>{d.siteAddress||"—"}</div>}
                    </div>
                    <SL>🏗️ Site Conditions</SL>
                    {[{l:"PPE",k:"ppe"},{l:"Union Rules",k:"unionRules"},{l:"Work Hours",k:"workHours"},{l:"Ceiling Type",k:"ceilingType"},{l:"Mounting Type",k:"mountingType"}].map(({l,k})=>(
                      <div key={k} style={iRow}>
                        <span style={iLbl}>{l}</span>
                        {edit?<EI value={d[k]} onChange={s(k)} style={{color:"#e2e8f0",textAlign:"right",fontSize:12}}/>
                             :<span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{d[k]||"—"}</span>}
                      </div>
                    ))}
                    <div style={iRow}><span style={iLbl}>COI Required</span>
                      {edit?<YN val={d.coiRequired} set={s("coiRequired")} size="small"/>:<span style={{fontSize:12,fontWeight:600,color:d.coiRequired==="Y"?"#fbbf24":"#64748b"}}>{d.coiRequired==="Y"?"Yes":"No"}</span>}
                    </div>
                    <div style={iRow}><span style={iLbl}>Site Survey</span>
                      {edit?<EI value={d.siteSurveyLink} onChange={s("siteSurveyLink")} style={{color:"#818cf8",textAlign:"right",fontSize:12}}/>
                           :d.siteSurveyLink?<a href={d.siteSurveyLink} target="_blank" rel="noreferrer" style={{fontSize:12,fontWeight:600,color:"#818cf8",textDecoration:"underline"}}>View ↗</a>:<span style={{fontSize:12,color:"#334155"}}>Not added</span>}
                    </div>
                  </Card>

                  {/* Access Contact */}
                  <Card>
                    <SL>🔑 Access Contact</SL>
                    <div style={{display:"flex",alignItems:"center",gap:12,background:"rgba(51,65,85,0.4)",borderRadius:10,padding:12,marginBottom:12}}>
                      <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#f59e0b,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,flexShrink:0}}>{initials(d.accessName)}</div>
                      <div style={{flex:1,minWidth:0}}>
                        {edit?<EI value={d.accessName} onChange={s("accessName")} style={{color:"#fff",fontWeight:700}}/>:<div style={{fontWeight:700,color:"#fff",fontSize:13}}>{d.accessName||"—"}</div>}
                        {edit?<EI value={d.accessEmail} onChange={s("accessEmail")} style={{color:"#94a3b8",fontSize:11}}/>:<div style={{color:"#94a3b8",fontSize:11}}>{d.accessEmail||"—"}</div>}
                        {edit?<EI value={d.accessPhone} onChange={s("accessPhone")} style={{color:"#fbbf24",fontSize:12}}/>:<div style={{color:"#fbbf24",fontSize:12,fontWeight:600}}>{d.accessPhone||"—"}</div>}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Access Type</div>
                      {edit?<select value={d.accessType} onChange={e=>s("accessType")(e.target.value)} style={selStyle}><option>Badge Access</option><option>Escort</option><option>Other</option></select>
                           :<span style={{padding:"3px 10px",borderRadius:8,fontSize:12,fontWeight:700,background:d.accessType==="Badge Access"?"rgba(5,46,22,0.8)":"rgba(120,53,15,0.8)",color:d.accessType==="Badge Access"?"#34d399":"#fcd34d"}}>{d.accessType==="Badge Access"?"🪪":"👮"} {d.accessType}</span>}
                    </div>
                    <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:4}}>Access Notes</div>
                    {edit?<textarea value={d.accessNote||""} onChange={e=>s("accessNote")(e.target.value)} rows={2} style={taStyle}/>
                         :<div style={{fontSize:12,color:"#cbd5e1",background:"rgba(51,65,85,0.4)",borderRadius:8,padding:"8px 10px"}}>{d.accessNote||"—"}</div>}

                    {/* Install details in same card */}
                    <div style={{marginTop:16,paddingTop:12,borderTop:"1px solid #334155"}}>
                      <SL>🔧 Installation</SL>
                      <div style={iRow}><span style={iLbl}>Installer / Team</span>
                        {edit?<EI value={d.installerName} onChange={s("installerName")} style={{color:"#67e8f9",textAlign:"right",fontSize:12}}/>:<span style={{fontSize:12,fontWeight:600,color:"#67e8f9"}}>{d.installerName||"—"}</span>}
                      </div>
                      {[{l:"Self Install",k:"selfInstall"},{l:"Construction Site",k:"construction"},{l:"Added to Install Tool",k:"addedToInstallTool"}].map(({l,k})=>(
                        <div key={k} style={iRow}><span style={iLbl}>{l}</span>
                          {edit?<YN val={d[k]} set={s(k)} size="small"/>:<span style={{fontSize:11,fontWeight:700,color:d[k]==="Y"?"#34d399":"#64748b"}}>{d[k]==="Y"?"Yes":"No"}</span>}
                        </div>
                      ))}
                      {d.whatsappLink&&(
                        <div style={{marginTop:10}}>
                          <a href={d.whatsappLink} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(5,46,22,0.6)",border:"1px solid #166634",borderRadius:10,padding:"8px 14px",color:"#4ade80",fontWeight:700,fontSize:12}}>
                            <span style={{fontSize:16}}>💬</span> Open WhatsApp Chat ↗
                          </a>
                        </div>
                      )}
                      {edit&&<div style={{marginTop:8}}><div style={{fontSize:10,color:"#64748b",marginBottom:4}}>WhatsApp Link</div><EI value={d.whatsappLink} onChange={s("whatsappLink")} style={{color:"#4ade80",fontSize:12}}/></div>}
                    </div>
                  </Card>
                </div>
              )}

              {/* DEVICES */}
              {detailTab==="devices"&&(
                <div>
                  <Card style={{marginBottom:12}}>
                    <SL>📦 Order Progress</SL>
                    <div style={{display:"flex",alignItems:"flex-start",marginBottom:16}}>
                      {ORDER.map((step,i)=>(
                        <div key={step} style={{display:"flex",alignItems:"center",flex:1}}>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                            <button onClick={()=>edit&&s("orderStatus")(step)} style={{width:26,height:26,borderRadius:"50%",border:"none",cursor:edit?"pointer":"default",fontWeight:900,fontSize:10,background:i<=oidx?OCOL[i]:"#334155",color:i<=oidx?"#fff":"#64748b",display:"flex",alignItems:"center",justifyContent:"center"}}>{i<oidx?"✓":i+1}</button>
                            <div style={{fontSize:9,marginTop:3,textAlign:"center",fontWeight:i===oidx?700:400,color:i===oidx?"#fff":"#64748b",lineHeight:1.2}}>{step}</div>
                          </div>
                          {i<ORDER.length-1&&<div style={{height:1,flex:1,marginBottom:14,background:i<oidx?"#6366f1":"#334155"}}/>}
                        </div>
                      ))}
                    </div>
                    <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #334155",marginBottom:10}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                        <thead><tr style={{background:"rgba(51,65,85,0.5)"}}>{["Device","Qty","Ship List",""].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                        <tbody>
                          {d.devices.map((dv,i)=>(
                            <tr key={i} style={{borderTop:"1px solid #334155"}}>
                              <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.type} onChange={v=>updDev(i,"type",v)} style={{color:"#fff",fontWeight:600}}/>:<span style={{color:"#fff",fontWeight:600}}>{dv.type||"—"}</span>}</td>
                              <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.qty} onChange={v=>updDev(i,"qty",v)} style={{color:"#22d3ee",fontWeight:700,width:40}}/>:<span style={{color:"#22d3ee",fontWeight:700}}>{dv.qty||"—"}</span>}</td>
                              <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.shipListLink} onChange={v=>updDev(i,"shipListLink",v)} style={{color:"#818cf8",fontSize:11}}/>:dv.shipListLink?<a href={dv.shipListLink} target="_blank" rel="noreferrer" style={{color:"#818cf8",textDecoration:"underline",fontSize:11}}>View ↗</a>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                              <td style={{padding:"8px 12px"}}>{edit&&<button onClick={()=>delDev(i)} style={{background:"transparent",border:"none",color:"#475569",fontSize:14,cursor:"pointer"}} onMouseOver={e=>e.target.style.color="#ef4444"} onMouseOut={e=>e.target.style.color="#475569"}>×</button>}</td>
                            </tr>
                          ))}
                          {d.devices.length===0&&<tr><td colSpan={4} style={{padding:"16px 12px",textAlign:"center",color:"#334155",fontSize:12}}>No devices added</td></tr>}
                        </tbody>
                      </table>
                    </div>
                    {edit&&<button onClick={addDev} style={{background:"transparent",border:"none",color:"#818cf8",fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add device row</button>}
                  </Card>
                </div>
              )}

              {/* NOTES */}
              {detailTab==="notes"&&(
                <div style={{maxWidth:700}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <SL>📝 Project Notes</SL>
                    <button onClick={()=>setShowAddNote(v=>!v)} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{showAddNote?"✕ Cancel":"+ Add Note"}</button>
                  </div>
                  {showAddNote&&(
                    <Card style={{marginBottom:12}}>
                      <input value={newAuthor} onChange={e=>setNewAuthor(e.target.value)} placeholder="Your name (optional)" style={{width:"100%",background:"#334155",border:"1px solid #475569",color:"#fff",fontSize:12,borderRadius:8,padding:"8px 12px",outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
                      <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Type your note..." rows={3} style={{...taStyle,marginBottom:8}}/>
                      <button onClick={saveNote} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save Note</button>
                    </Card>
                  )}
                  {d.notes.length===0&&<div style={{textAlign:"center",color:"#334155",padding:"32px 0",fontSize:13}}>No notes yet.</div>}
                  {[...d.notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)).map(n=>(
                    <div key={n.id} style={{borderRadius:14,padding:14,marginBottom:10,border:"1px solid "+(n.pinned?"#92400e":"#334155"),background:n.pinned?"rgba(120,53,15,0.2)":"#1e293b"}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0}}>{initials(n.author)}</div>
                          <div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{n.author}</div><div style={{fontSize:10,color:"#64748b"}}>{n.date}</div></div>
                          {n.pinned&&<span>📌</span>}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>pinNote(n.id)} style={{background:n.pinned?"rgba(120,53,15,0.6)":"#334155",color:n.pinned?"#fcd34d":"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{n.pinned?"Unpin":"Pin"}</button>
                          <button onClick={()=>delNote(n.id)} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Delete</button>
                        </div>
                      </div>
                      <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6}}>{n.text}</div>
                    </div>
                  ))}
                </div>
              )}

            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── MAIN APP ──
function App() {
  const [projects,setProjects]=useState([]);
  const [activeId,setActiveId]=useState(null);
  const [loading,setLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);

  useEffect(()=>{
    const init=async()=>{
      setLoading(true);
      try{ const c=localStorage.getItem("vs_projects"); if(c) setProjects(JSON.parse(c)); }catch(e){}
      let hashId=null;
      try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) hashId=h.replace("#project-",""); }catch(e){}
      const live=await api.getAll();
      if(live&&live.length>0){
        setProjects(live);
        try{ localStorage.setItem("vs_projects",JSON.stringify(live)); }catch(e){}
        if(hashId&&live.find(p=>p.id===hashId)) setActiveId(hashId);
      } else {
        try{ const c=localStorage.getItem("vs_projects"); if(c){ const list=JSON.parse(c); setProjects(list); if(hashId&&list.find(p=>p.id===hashId)) setActiveId(hashId); } }catch(e){}
      }
      setLoading(false);
    };
    init();
  },[]);

  useEffect(()=>{
    try{ if(activeId) window.location.hash="project-"+activeId; else window.location.hash=""; }catch(e){}
  },[activeId]);

  useEffect(()=>{
    const onHash=()=>{ try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) setActiveId(h.replace("#project-","")); else setActiveId(null); }catch(e){} };
    window.addEventListener("hashchange",onHash);
    return()=>window.removeEventListener("hashchange",onHash);
  },[]);

  const createProject=async(clientName,siteName,floorName)=>{
    const p=BLANK(clientName,siteName,floorName);
    const updated=[p,...projects];
    setProjects(updated);
    try{ localStorage.setItem("vs_projects",JSON.stringify(updated)); }catch(e){}
    setSyncing(true); await api.save(p); setSyncing(false);
    setActiveId(p.id);
  };

  const saveProject=async(updated)=>{
    const list=projects.map(p=>p.id===updated.id?updated:p);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.save(updated);
  };

  const deleteProject=async(id)=>{
    const list=projects.filter(p=>p.id!==id);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.delete(id);
    if(activeId===id) setActiveId(null);
  };

  const active=projects.find(p=>p.id===activeId)||null;

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>⚡</div>
      <div style={{fontSize:14,color:"#6366f1",fontWeight:700}}>Loading VergeSense Dashboard...</div>
      <div style={{fontSize:12,color:"#334155"}}>Syncing with Google Sheets</div>
    </div>
  );

  if(active) return <ProjectDashboard project={active} onSave={saveProject} onBack={()=>setActiveId(null)} syncing={syncing}/>;
  return <ProjectList projects={projects} onOpen={setActiveId} onCreate={createProject} onDelete={deleteProject} syncing={syncing}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
