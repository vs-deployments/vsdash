<script>
// ═══════════════════════════════════════════════════
// GOOGLE SSO AUTH GATE
// ═══════════════════════════════════════════════════
//
// ┌─────────────────────────────────────────────┐
// │  SETUP REQUIRED — Replace this Client ID    │
// │  with your Google Cloud OAuth Client ID.    │
// │  See instructions below the code.           │
// └─────────────────────────────────────────────┘

const GOOGLE_CLIENT_ID = "343297615886-fu2t3aoghnqf4go2cakf6omh3a2fbgkn.apps.googleusercontent.com";
const ALLOWED_DOMAIN   = "vergesense.com";
const SESSION_KEY      = "vs_auth_user";

// Parse a JWT token (Google ID tokens are JWTs)
function parseJwt(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(
      atob(base64).split('').map(c =>
        '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
      ).join('')
    );
    return JSON.parse(jsonPayload);
  } catch (e) {
    return null;
  }
}

// Check for existing session
function getStoredUser() {
  try {
    const stored = sessionStorage.getItem(SESSION_KEY);
    if (!stored) return null;
    const user = JSON.parse(stored);
    // Check if token is still valid (not expired)
    if (user.exp && user.exp * 1000 < Date.now()) {
      sessionStorage.removeItem(SESSION_KEY);
      return null;
    }
    return user;
  } catch (e) {
    return null;
  }
}

function storeUser(user) {
  try { sessionStorage.setItem(SESSION_KEY, JSON.stringify(user)); } catch(e) {}
}

function clearUser() {
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
  try { localStorage.removeItem(SESSION_KEY); } catch(e) {}
}

// Global auth state
window.__vsAuth = {
  user: getStoredUser(),
  onLogin: null,  // callback set by React
  onLogout: null,
};

// Google Sign-In callback
function handleGoogleSignIn(response) {
  const payload = parseJwt(response.credential);
  if (!payload) {
    showLoginError("Unable to verify your Google account. Please try again.");
    return;
  }

  const email = payload.email || "";
  const domain = email.split("@")[1] || "";

  if (domain.toLowerCase() !== ALLOWED_DOMAIN) {
    showLoginError("Access restricted to @" + ALLOWED_DOMAIN + " accounts. You signed in with " + email);
    // Revoke the credential so they can try a different account
    google.accounts.id.disableAutoSelect();
    return;
  }

  const user = {
    email: payload.email,
    name: payload.name || payload.email.split("@")[0],
    picture: payload.picture || "",
    exp: payload.exp,
  };

  storeUser(user);
  window.__vsAuth.user = user;

  if (window.__vsAuth.onLogin) {
    window.__vsAuth.onLogin(user);
  }
}

function showLoginError(msg) {
  const el = document.getElementById("login-error");
  if (el) { el.textContent = msg; el.classList.add("visible"); }
}

function signOut() {
  clearUser();
  window.__vsAuth.user = null;
  google.accounts.id.disableAutoSelect();
  if (window.__vsAuth.onLogout) {
    window.__vsAuth.onLogout();
  }
}
</script>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const SITE_URL = "https://vs-deployments.github.io/vsdash/";
const API_URL  = "https://script.google.com/macros/s/AKfycbx7oz6HpMBxjdarV1LOYtlLDqbq2nJJaJtjsyK10q51vVDVCk-fjSAVk3bSNkutfDI/exec";
const slugify  = s => s.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
const getUrl   = id => SITE_URL + "#project-" + id;
const today    = () => new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});

const api = {
  getAll: async () => { try { const r=await fetch(API_URL+"?action=getAll"); const j=await r.json(); return j.success?j.projects:[]; } catch(e){ return []; } },
  save:   async p  => { try { await fetch(API_URL+"?action=save&data="+encodeURIComponent(JSON.stringify(p))); return true; } catch(e){ return false; } },
  del:    async id => { try { await fetch(API_URL+"?action=delete&id="+encodeURIComponent(id)); return true; } catch(e){ return false; } },

};

  clientName, siteName, floorName,

  internalOwner:"", ae:"", csm:"",
  nextMilestone:"", installDate:"", goLiveTarget:"",
  blockerPresent:"N", blockerText:"", escalation:"N", lastUpdated:today(),
  salesforceLink:"",
  metadataReceived:"N", floorPlansReceived:"N", networkConfirmed:"N",
  coiSubmitted:"N", shippingInfoConfirmed:"N",
  orderActivated:"N", mapDigitized:"N", techAssigned:"N",
  whatsappCreated:"N", installScheduled:"N", validationRequested:"N", csHandoff:"N",
  kickoffDate:"", lastClientTouchpoint:"", lastInternalUpdate:"",
  blockerWhat:"", blockerOwner:"", blockerSince:"",
  projectType:"New Deployment", pocName:"", pocEmail:"", pocPhone:"",
  orderStatus:"Ordered", devices:[], wifiConfigRequired:"N",

  shipped:"N", shipCarrier:"", trackingNumber:"", trackingLink:"", deliveryDate:"",

const SC = {

  Yellow: {bg:"#f59e0b",dot:"#fbbf24",ring:"#fbbf24",label:"At Risk"},

function EI({value,onChange,style,placeholder}) {
  return <input value={value||""} onChange={e=>onChange(e.target.value)} placeholder={placeholder||""} style={{background:"transparent",border:"none",borderBottom:"1px dashed #475569",color:"inherit",fontSize:13,width:"100%",outline:"none",padding:"2px 0",...(style||{})}}/>;

function Card({children,style}) {

}

function CopyBtn({id}) {
  const [copied,setCopied] = useState(false);
  const copy = e => {
    e&&e.stopPropagation();
    const url=getUrl(id);
    const fb=()=>{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);};
    if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{}).catch(fb); else fb();
    setCopied(true); setTimeout(()=>setCopied(false),2500);
  };
  return <button onClick={copy} style={{background:copied?"#10b981":"#334155",color:copied?"#fff":"#94a3b8",border:"none",borderRadius:8,padding:"6px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap"}}>{copied?"✅ Copied!":"🔗 Copy Link"}</button>;
}

    <div className="user-bar">
      {user.picture && <img src={user.picture} className="user-avatar" referrerPolicy="no-referrer" alt=""/>}
      <span className="user-name">{user.name}</span>
      <button className="signout-btn" onClick={()=>signOut()}>Sign Out</button>
    </div>

// ─── LOGIN SCREEN ───
function LoginScreen() {
  const [ready,setReady] = useState(false);

  useEffect(() => {
    // Wait for Google Identity Services to load, then initialize
    const initGsi = () => {
      if (typeof google !== "undefined" && google.accounts) {
        google.accounts.id.initialize({
          client_id: GOOGLE_CLIENT_ID,
          callback: handleGoogleSignIn,
          auto_select: false,
          hosted_domain: ALLOWED_DOMAIN,
        });
        google.accounts.id.renderButton(
          document.getElementById("g-signin-btn"),
          {
            theme: "filled_black",
            size: "large",
            width: 300,
            text: "signin_with",
            shape: "pill",
          }
        );
        setReady(true);
      } else {
        setTimeout(initGsi, 200);
      }
    };
    initGsi();
  }, []);

  return (
    <div className="login-container">
      <div className="login-card">
        <div className="login-logo">⚡</div>
        <div className="login-title">VergeSense <span>Deployments</span></div>
        <div className="login-subtitle">Internal Deployment Dashboard</div>
        <div className="login-domain">🔒 @vergesense.com accounts only</div>
        <div>
          <div id="g-signin-btn" style={{display:"flex",justifyContent:"center",minHeight:44}}></div>
          {!ready && <div className="login-loading">Loading sign-in...</div>}
        </div>
        <div id="login-error" className="login-error"></div>
      </div>
      <div style={{fontSize:11,color:"#1e293b"}}>VergeSense Deployment Dashboard · Internal Use Only</div>
    </div>
  );
}

// ─── PROJECT DASHBOARD ───
function ProjectDashboard({project,onSave,onBack,syncing,user}) {
  const [d,setD]   = useState(project);
  const [edit,setEdit] = useState(false);
  const [dtab,setDtab] = useState("shipping");
  const [l3open,setL3open] = useState(false);
  const [linkCopied,setLinkCopied] = useState(false);
  const [newNote,setNewNote]     = useState("");
  const [newAuthor,setNewAuthor] = useState(user ? user.name : "");
  const [showAddNote,setShowAddNote] = useState(false);

  useEffect(()=>{ onSave(d); },[d]);

  const s   = k => v => setD(p=>({...p,[k]:v}));
  const sc  = SC[d.status]||SC.Green;
  const oidx = ORDER.indexOf(d.orderStatus);
  const readyArr = [d.networkReady,d.powerAvailable,d.devicesConfigured];
  const finalGo  = readyArr.every(x=>x==="Y");
  const pct = Math.round(readyArr.filter(x=>x==="Y").length/3*100);

  const addDev = () => setD(p=>({...p,devices:[...p.devices,{type:"",qty:"",shipListLink:""}]}));
  const updDev = (i,k,v) => setD(p=>{const devs=[...p.devices];devs[i]={...devs[i],[k]:v};return{...p,devices:devs};});
  const delDev = i => setD(p=>({...p,devices:p.devices.filter((_,x)=>x!==i)}));

  const saveNote = () => {
    if(!newNote.trim()) return;
    setD(p=>({...p,notes:[{id:Date.now(),author:newAuthor||user?.name||"You",date:today(),text:newNote.trim(),pinned:false},...p.notes]}));
    setNewNote("");setShowAddNote(false);
  };
  const delNote = id => setD(p=>({...p,notes:p.notes.filter(n=>n.id!==id)}));
  const pinNote = id => setD(p=>({...p,notes:p.notes.map(n=>n.id===id?{...n,pinned:!n.pinned}:n)}));
  const pinned  = d.notes.filter(n=>n.pinned);
  const ini = name => name?name.split(" ").map(n=>n[0]).join("").slice(0,2).toUpperCase():"??";

  const addMeeting = () => setD(p=>({...p,meetingNotes:[{id:Date.now(),date:today(),title:"",body:"",source:"Granola"},...(p.meetingNotes||[])]}));
  const updMeeting = (i,k,v) => setD(p=>{const m=[...(p.meetingNotes||[])];m[i]={...m[i],[k]:v};return{...p,meetingNotes:m};});
  const delMeeting = i => setD(p=>({...p,meetingNotes:(p.meetingNotes||[]).filter((_,x)=>x!==i)}));

  const copyLink = () => {
    const url=getUrl(d.id);
    const fb=()=>{const t=document.createElement("textarea");t.value=url;document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);};
    if(navigator.clipboard) navigator.clipboard.writeText(url).then(()=>{}).catch(fb); else fb();
    setLinkCopied(true); setTimeout(()=>setLinkCopied(false),2500);
  };

  const cDelivs  = {metadataReceived:"Metadata received",floorPlansReceived:"Floor plans received",networkConfirmed:"Network confirmed",coiSubmitted:"COI submitted",shippingInfoConfirmed:"Shipping info confirmed"};
  const iDelivs  = {orderActivated:"Order activated",mapDigitized:"Map digitized",techAssigned:"Tech assigned",whatsappCreated:"WhatsApp created",installScheduled:"Install scheduled",validationRequested:"Validation requested",csHandoff:"CS handoff"};
  const cPct = Math.round(Object.keys(cDelivs).filter(k=>d[k]==="Y").length/Object.keys(cDelivs).length*100);
  const iPct = Math.round(Object.keys(iDelivs).filter(k=>d[k]==="Y").length/Object.keys(iDelivs).length*100);

  const ta  = {background:"#334155",border:"1px solid #475569",color:"#e2e8f0",fontSize:13,width:"100%",outline:"none",padding:"8px 12px",borderRadius:8,resize:"none",fontFamily:"inherit"};
  const sel = {background:"#334155",border:"1px solid #475569",color:"#fff",fontSize:13,width:"100%",outline:"none",padding:"8px 12px",borderRadius:8,fontFamily:"inherit"};
  const iRow = {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 0",borderBottom:"1px solid #334155",gap:12};
  const iLbl = {fontSize:11,color:"#64748b",fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em",flexShrink:0};
  const g2   = {display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16};

  const DTABS = [
    {id:"shipping",label:"📦 Shipping"},
    {id:"network", label:"🌐 Network"},
    {id:"site",    label:"🏗️ Site & Install"},
    {id:"devices", label:"🖥️ Devices"},
    {id:"notes",   label:"📝 Notes"+(d.notes.length>0?" ("+d.notes.length+")":"")},
  ];

  const slackPreview = `📊 *Weekly Project Update*
*Project:* ${d.clientName||"—"} · ${d.siteName||"—"}${d.floorName?" · "+d.floorName:""}
*Phase:* ${d.projectPhase||"Pre-Install"}
*Status:* ${d.status==="Green"?"🟢":d.status==="Yellow"?"🟡":"🔴"} ${SC[d.status]?.label}
*Owner:* ${d.internalOwner||"—"} | *AE:* ${d.ae||"—"} | *CSM:* ${d.csm||"—"}
*Install:* ${d.installDate||"TBD"} | *Go-Live:* ${d.goLiveTarget||"TBD"}${d.blockerPresent==="Y"?"\n🚨 *BLOCKER:* "+(d.blockerText||"See dashboard"):""}${d.escalation==="Y"?"\n⚠️ *ESCALATION REQUIRED*":""}${d.nextMilestone?"\n*Next Milestone:* "+d.nextMilestone:""}
🔗 ${getUrl(d.id)}`;

  return (
    <div style={{minHeight:"100vh",background:"#0f172a"}}>

      {/* TOPBAR */}
      <div style={{borderBottom:"1px solid #1e293b",padding:"10px 20px",background:"#0f172a",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:1200,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={onBack} style={{background:"#1e293b",border:"1px solid #334155",color:"#94a3b8",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>← All Projects</button>
            <div style={{width:10,height:10,borderRadius:"50%",background:sc.dot,boxShadow:"0 0 0 2px "+sc.ring}}/>
            <div>
              {edit?(
                <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                  <EI value={d.clientName} onChange={s("clientName")} style={{color:"#fff",fontWeight:900,fontSize:14,width:110}}/>
                  <span style={{color:"#475569"}}>·</span>
                  <EI value={d.siteName} onChange={s("siteName")} style={{color:"#818cf8",fontWeight:900,fontSize:14,width:110}}/>
                  <span style={{color:"#475569"}}>·</span>
                  <EI value={d.floorName} onChange={s("floorName")} style={{color:"#94a3b8",fontSize:12,width:80}}/>
                </div>
              ):(
                <div style={{fontSize:15,fontWeight:900}}>
                  {d.clientName||"New Project"}<span style={{color:"#475569",margin:"0 4px"}}>·</span>
                  <span style={{color:"#818cf8"}}>{d.siteName}</span>
                  {d.floorName&&<span style={{color:"#64748b",fontWeight:400,fontSize:13}}> · {d.floorName}</span>}
                </div>
              )}
              <div style={{marginTop:2}}>
                {edit
                  ?<EI value={d.salesforceLink} onChange={s("salesforceLink")} style={{color:"#38bdf8",fontSize:11,width:220}} placeholder="Paste Salesforce Opportunity URL..."/>
                  :d.salesforceLink
                    ?<a href={d.salesforceLink} target="_blank" rel="noreferrer" style={{fontSize:11,color:"#38bdf8",textDecoration:"underline"}}>☁️ Salesforce Opportunity ↗</a>
                    :<span style={{fontSize:11,color:"#334155"}}>No Salesforce link</span>
                }
              </div>
            </div>
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
            {syncing&&<span style={{fontSize:11,color:"#6366f1"}}>⟳ Saving...</span>}
            <UserBar user={user}/>
            <button onClick={copyLink} style={{background:linkCopied?"#10b981":"#0f172a",color:linkCopied?"#fff":"#818cf8",border:"1px solid "+(linkCopied?"#10b981":"#6366f1"),borderRadius:8,padding:"5px 12px",fontSize:11,fontWeight:700,cursor:"pointer",transition:"all 0.2s"}}>{linkCopied?"✅ Copied!":"🔗 Copy Project Link"}</button>
            {pinned.length>0&&<div style={{background:"#451a03",border:"1px solid #92400e",borderRadius:8,padding:"4px 10px",fontSize:11,color:"#fcd34d",fontWeight:700}}>📌 {pinned.length}</div>}
            <div style={{background:sc.bg,color:"#fff",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:900}}>{sc.label}</div>
            <button onClick={()=>setEdit(e=>!e)} style={{background:edit?"#4f46e5":"#1e293b",color:edit?"#fff":"#94a3b8",border:"1px solid "+(edit?"#6366f1":"#334155"),borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{edit?"✏️ Done":"✏️ Edit"}</button>
          </div>
        </div>
      </div>

      {linkCopied&&<div style={{background:"#10b981",padding:"8px",textAlign:"center",fontSize:12,fontWeight:700,color:"#fff"}}>✅ Link copied! Paste into your Google Drive project folder.</div>}

      <div style={{maxWidth:1200,margin:"0 auto",padding:"20px"}}>

        {/* ── LAYER 1 ── */}

          <div style={{width:3,height:20,background:"#6366f1",borderRadius:2}}/>
          <span style={{fontSize:12,fontWeight:700,color:"#6366f1",textTransform:"uppercase",letterSpacing:"0.1em"}}>Layer 1 — Executive View</span>
          <span style={{fontSize:11,color:"#334155"}}>30-second scan</span>
        </div>

        {(d.blockerPresent==="Y"||d.escalation==="Y")&&(
          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap"}}>
            {d.blockerPresent==="Y"&&<div style={{flex:1,minWidth:250,background:"rgba(239,68,68,0.1)",border:"1px solid #ef4444",borderRadius:12,padding:"10px 16px",display:"flex",gap:10,alignItems:"flex-start"}}><span style={{fontSize:18,flexShrink:0}}>🚨</span><div><div style={{fontSize:12,fontWeight:700,color:"#f87171",marginBottom:2}}>BLOCKER</div><div style={{fontSize:12,color:"#fca5a5"}}>{d.blockerText||"Blocker present"}</div></div></div>}
            {d.escalation==="Y"&&<div style={{flex:1,minWidth:250,background:"rgba(245,158,11,0.1)",border:"1px solid #f59e0b",borderRadius:12,padding:"10px 16px",display:"flex",gap:10,alignItems:"center"}}><span style={{fontSize:18}}>⚠️</span><div style={{fontSize:12,fontWeight:700,color:"#fbbf24"}}>ESCALATION REQUIRED</div></div>}
          </div>
        )}

        <Card style={{marginBottom:16,background:"linear-gradient(135deg,#1e293b,#1a2540)"}}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:12}}>
            {[
              {label:"Project Phase",  key:"projectPhase",  color:"#a5b4fc", isPhase:true},
              {label:"Status",         key:"status",        color:"#fff",    isStatus:true},
              {label:"Internal Owner", key:"internalOwner", color:"#c4b5fd"},
              {label:"AE",             key:"ae",            color:"#f0abfc"},
              {label:"CSM",            key:"csm",           color:"#6ee7b7"},
              {label:"Install Date",   key:"installDate",   color:"#fbbf24"},
              {label:"Go-Live Target", key:"goLiveTarget",  color:"#34d399"},
            ].map(({label,key,color,isPhase,isStatus})=>(
              <div key={key} style={{background:"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid rgba(99,102,241,0.2)"}}>
                <div style={{fontSize:10,color:"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>{label}</div>
                {isPhase&&edit
                  ?<select value={d[key]||"Pre-Install"} onChange={e=>s(key)(e.target.value)} style={{...sel,background:"transparent",border:"1px solid rgba(99,102,241,0.3)",color,fontSize:12,padding:"4px 8px"}}>{PHASES.map(p=><option key={p}>{p}</option>)}</select>
                  :isStatus&&edit
                  ?<div style={{display:"flex",gap:4}}>{["Green","Yellow","Red"].map(c=><button key={c} onClick={()=>s("status")(c)} style={{flex:1,padding:"4px 0",borderRadius:6,border:"none",fontWeight:700,fontSize:10,cursor:"pointer",background:d.status===c?SC[c].bg:"#334155",color:"#fff"}}>{c}</button>)}</div>
                  :isStatus
                  ?<div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:sc.dot}}/><span style={{fontSize:14,fontWeight:700,color:"#fff"}}>{sc.label}</span></div>
                  :edit
                  ?<EI value={d[key]} onChange={s(key)} style={{color,fontWeight:600}} placeholder={label}/>
                  :<div style={{fontSize:14,fontWeight:700,color}}>{d[key]||"—"}</div>
                }
              </div>
            ))}
            {/* Blocker */}
            <div style={{background:d.blockerPresent==="Y"?"rgba(239,68,68,0.1)":"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid "+(d.blockerPresent==="Y"?"rgba(239,68,68,0.4)":"rgba(99,102,241,0.2)")}}>
              <div style={{fontSize:10,color:d.blockerPresent==="Y"?"#f87171":"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>🚨 Blocker</div>
              {edit?<div><YN val={d.blockerPresent} set={s("blockerPresent")} size="small"/>{d.blockerPresent==="Y"&&<EI value={d.blockerText} onChange={s("blockerText")} style={{color:"#fca5a5",fontSize:11,marginTop:6}} placeholder="Describe..."/>}</div>
                   :<div><div style={{fontSize:13,fontWeight:700,color:d.blockerPresent==="Y"?"#f87171":"#64748b"}}>{d.blockerPresent==="Y"?"Yes":"No"}</div>{d.blockerPresent==="Y"&&d.blockerText&&<div style={{fontSize:11,color:"#fca5a5",marginTop:2}}>{d.blockerText}</div>}</div>}
            </div>
            {/* Escalation */}
            <div style={{background:d.escalation==="Y"?"rgba(245,158,11,0.1)":"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid "+(d.escalation==="Y"?"rgba(245,158,11,0.4)":"rgba(99,102,241,0.2)")}}>
              <div style={{fontSize:10,color:d.escalation==="Y"?"#fbbf24":"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>⚠️ Escalation</div>
              {edit?<YN val={d.escalation} set={s("escalation")} size="small"/>:<div style={{fontSize:13,fontWeight:700,color:d.escalation==="Y"?"#fbbf24":"#64748b"}}>{d.escalation==="Y"?"Yes":"No"}</div>}
            </div>
            {/* Last Updated */}
            <div style={{background:"rgba(99,102,241,0.1)",borderRadius:12,padding:12,border:"1px solid rgba(99,102,241,0.2)"}}>
              <div style={{fontSize:10,color:"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:6}}>Last Updated</div>
              <div style={{fontSize:12,fontWeight:600,color:"#94a3b8"}}>{d.lastUpdated||"—"}</div>
              {edit&&<button onClick={()=>s("lastUpdated")(today())} style={{marginTop:4,background:"#334155",border:"none",color:"#94a3b8",borderRadius:6,padding:"3px 8px",fontSize:10,cursor:"pointer"}}>Today</button>}
            </div>
          </div>

          {/* Salesforce + Next Milestone */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:12}}>
            <div style={{background:"rgba(56,189,248,0.08)",borderRadius:10,padding:"10px 14px",border:"1px solid rgba(56,189,248,0.2)"}}>
              <div style={{fontSize:10,color:"#38bdf8",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>☁️ Salesforce Opportunity</div>
              {edit?<EI value={d.salesforceLink} onChange={s("salesforceLink")} style={{color:"#38bdf8",fontSize:13}} placeholder="Paste Salesforce URL..."/>
                   :d.salesforceLink?<a href={d.salesforceLink} target="_blank" rel="noreferrer" style={{fontSize:13,color:"#38bdf8",textDecoration:"underline",fontWeight:600}}>Open in Salesforce ↗</a>
                   :<div style={{fontSize:13,color:"#334155"}}>No link added</div>}
            </div>
            <div style={{background:"rgba(99,102,241,0.08)",borderRadius:10,padding:"10px 14px",border:"1px solid rgba(99,102,241,0.15)"}}>
              <div style={{fontSize:10,color:"#6366f1",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>🎯 Next Milestone</div>
              {edit?<EI value={d.nextMilestone} onChange={s("nextMilestone")} style={{color:"#e2e8f0",fontSize:13}} placeholder="e.g. Client confirmation by Friday..."/>
                   :<div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>{d.nextMilestone||"No milestone set"}</div>}
            </div>
          </div>
        </Card>

        {/* ── LAYER 2 ── */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:3,height:20,background:"#f59e0b",borderRadius:2}}/>
          <span style={{fontSize:12,fontWeight:700,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.1em"}}>Layer 2 — PM Control</span>
          <span style={{fontSize:11,color:"#334155"}}>Your world</span>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16,marginBottom:16}}>
          {/* Client Deliverables */}
          <Card>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <SL color="#22d3ee">📋 Client Deliverables</SL>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:60,height:4,background:"#334155",borderRadius:4}}><div style={{height:4,borderRadius:4,background:"#22d3ee",width:cPct+"%",transition:"width 0.3s"}}/></div>
                <span style={{fontSize:10,color:"#22d3ee",fontWeight:700}}>{cPct}%</span>
              </div>
            </div>
            {Object.entries(cDelivs).map(([key,label])=><DelivCheck key={key} label={label} val={d[key]} set={s(key)}/>)}
          </Card>

          {/* Internal Deliverables */}
          <Card>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <SL color="#f59e0b">⚙️ Internal Deliverables</SL>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <div style={{width:60,height:4,background:"#334155",borderRadius:4}}><div style={{height:4,borderRadius:4,background:"#f59e0b",width:iPct+"%",transition:"width 0.3s"}}/></div>
                <span style={{fontSize:10,color:"#f59e0b",fontWeight:700}}>{iPct}%</span>
              </div>
            </div>
            {Object.entries(iDelivs).map(([key,label])=><DelivCheck key={key} label={label} val={d[key]} set={s(key)}/>)}
          </Card>

          {/* Key Dates + Blocker Detail */}
          <Card>
            <SL color="#34d399">📅 Key Dates</SL>
            {[{label:"Kickoff",key:"kickoffDate",color:"#94a3b8"},{label:"Install",key:"installDate",color:"#fbbf24"},{label:"Go-Live",key:"goLiveTarget",color:"#34d399"},{label:"Last Client Touch",key:"lastClientTouchpoint",color:"#22d3ee"},{label:"Last Internal",key:"lastInternalUpdate",color:"#a78bfa"}].map(({label,key,color})=>(
              <div key={key} style={iRow}>
                <span style={iLbl}>{label}</span>
                {edit?<EI value={d[key]} onChange={s(key)} style={{color,textAlign:"right",fontSize:12}} placeholder="MM/DD/YYYY"/>:<span style={{fontSize:12,fontWeight:600,color,textAlign:"right"}}>{d[key]||"—"}</span>}
              </div>
            ))}
            <div style={{marginTop:10}}>
              <SL color="#ef4444">🚨 Blocker Detail</SL>
              {[{label:"What",key:"blockerWhat",color:"#fca5a5"},{label:"Owner",key:"blockerOwner",color:"#fca5a5"},{label:"Since",key:"blockerSince",color:"#fca5a5"}].map(({label,key,color})=>(
                <div key={key} style={iRow}>
                  <span style={iLbl}>{label}</span>
                  {edit?<EI value={d[key]} onChange={s(key)} style={{color,textAlign:"right",fontSize:12}} placeholder="—"/>:<span style={{fontSize:12,fontWeight:600,color,textAlign:"right"}}>{d[key]||"—"}</span>}
                </div>
              ))}
            </div>
          </Card>

          {/* Risks & Next Steps */}
          <Card>
            <SL color="#f87171">⚠️ Risks & Next Steps</SL>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Risks</div>
              {edit?<textarea value={d.risks||""} onChange={e=>s("risks")(e.target.value)} rows={4} style={ta}/>
                   :<div>{(d.risks||"").split("\n").filter(Boolean).map((line,i)=><div key={i} style={{display:"flex",gap:8,background:"rgba(239,68,68,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:4}}><span style={{color:"#f87171",fontSize:10,marginTop:2}}>▸</span><span style={{fontSize:12,color:"#fca5a5"}}>{line.replace(/^[•\-]\s*/,"")}</span></div>)}{!d.risks&&<div style={{fontSize:12,color:"#334155"}}>None noted</div>}</div>}
            </div>
            <div>
              <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Next Steps</div>
              {edit?<textarea value={d.nextSteps||""} onChange={e=>s("nextSteps")(e.target.value)} rows={4} style={ta}/>
                   :<div>{(d.nextSteps||"").split("\n").filter(Boolean).map((line,i)=><div key={i} style={{display:"flex",gap:8,background:"rgba(99,102,241,0.08)",borderRadius:8,padding:"6px 10px",marginBottom:4}}><span style={{color:"#818cf8",fontSize:10,marginTop:2}}>▸</span><span style={{fontSize:12,color:"#c7d2fe"}}>{line.replace(/^[•\-]\s*/,"")}</span></div>)}{!d.nextSteps&&<div style={{fontSize:12,color:"#334155"}}>None added</div>}</div>}
            </div>
          </Card>

          {/* Meeting Notes */}
          <Card style={{gridColumn:"span 2"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,flexWrap:"wrap",gap:8}}>

              <div style={{display:"flex",gap:8,alignItems:"center"}}>

              </div>

            {(!d.meetingNotes||d.meetingNotes.length===0)&&<div style={{textAlign:"center",padding:"20px 0",color:"#334155",fontSize:13}}>No meeting notes yet. Click "+ Add Meeting" to get started.</div>}
            {(d.meetingNotes||[]).map((mn,i)=>(
              <div key={mn.id} style={{background:"rgba(167,139,250,0.08)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:12,padding:14,marginBottom:10}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                  <select value={mn.source||"Granola"} onChange={e=>updMeeting(i,"source",e.target.value)}
                    style={{background:"#1e293b",border:"1px solid #334155",color:"#a78bfa",fontSize:11,borderRadius:6,padding:"3px 8px",fontWeight:700,outline:"none",fontFamily:"inherit"}}>
                    <option>Granola</option><option>Zoom AI</option><option>Manual</option>

              {/* SITE & INSTALL */}
              {dtab==="site"&&(
                <div style={g2}>

                    <SL>📍 Site Address</SL>

                      {edit?<textarea value={d.siteAddress||""} onChange={e=>s("siteAddress")(e.target.value)} rows={2} style={{...ta,background:"transparent",border:"none",borderBottom:"1px dashed #475569",borderRadius:0,padding:"2px 0"}}/>:<div style={{color:"#fff",fontSize:13,lineHeight:1.6,whiteSpace:"pre-line"}}>{d.siteAddress||"—"}</div>}
                    </div>
                    <SL>🏗️ Site Conditions</SL>
                    {[{l:"PPE",k:"ppe"},{l:"Union Rules",k:"unionRules"},{l:"Work Hours",k:"workHours"},{l:"Ceiling Type",k:"ceilingType"},{l:"Mounting Type",k:"mountingType"}].map(({l,k})=>(
                      <div key={k} style={iRow}><span style={iLbl}>{l}</span>{edit?<EI value={d[k]} onChange={s(k)} style={{color:"#e2e8f0",textAlign:"right",fontSize:12}}/>:<span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>{d[k]||"—"}</span>}</div>
                    ))}
                    <div style={iRow}><span style={iLbl}>COI Required</span>{edit?<YN val={d.coiRequired} set={s("coiRequired")} size="small"/>:<span style={{fontSize:12,fontWeight:600,color:d.coiRequired==="Y"?"#fbbf24":"#64748b"}}>{d.coiRequired==="Y"?"Yes":"No"}</span>}</div>

                      <div style={{width:40,height:40,borderRadius:"50%",background:"linear-gradient(135deg,#f59e0b,#ea580c)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,flexShrink:0}}>{ini(d.accessName)}</div>
                      <div style={{flex:1,minWidth:0}}>

                        {edit?<EI value={d.accessEmail} onChange={s("accessEmail")} style={{color:"#94a3b8",fontSize:11}}/>:<div style={{color:"#94a3b8",fontSize:11}}>{d.accessEmail||"—"}</div>}
                        {edit?<EI value={d.accessPhone} onChange={s("accessPhone")} style={{color:"#fbbf24",fontSize:12}}/>:<div style={{color:"#fbbf24",fontSize:12,fontWeight:600}}>{d.accessPhone||"—"}</div>}
                      </div>
                    </div>
                    <div style={{marginBottom:12}}>
                      <div style={{fontSize:10,color:"#64748b",fontWeight:600,textTransform:"uppercase",marginBottom:6}}>Access Type</div>

                    {edit?<textarea value={d.accessNote||""} onChange={e=>s("accessNote")(e.target.value)} rows={2} style={ta}/>:<div style={{fontSize:12,color:"#cbd5e1",background:"rgba(51,65,85,0.4)",borderRadius:8,padding:"8px 10px"}}>{d.accessNote||"—"}</div>}
                    <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #334155"}}>
                      <SL>🔧 Installation</SL>
                      <div style={iRow}><span style={iLbl}>Installer</span>{edit?<EI value={d.installerName} onChange={s("installerName")} style={{color:"#67e8f9",textAlign:"right",fontSize:12}}/>:<span style={{fontSize:12,fontWeight:600,color:"#67e8f9"}}>{d.installerName||"—"}</span>}</div>
                      {[{l:"Self Install",k:"selfInstall"},{l:"Construction Site",k:"construction"},{l:"Added to Install Tool",k:"addedToInstallTool"}].map(({l,k})=>(

                      ))}
                      {d.whatsappLink&&<div style={{marginTop:10}}><a href={d.whatsappLink} target="_blank" rel="noreferrer" style={{display:"flex",alignItems:"center",gap:8,background:"rgba(5,46,22,0.6)",border:"1px solid #166534",borderRadius:10,padding:"8px 14px",color:"#4ade80",fontWeight:700,fontSize:12}}><span style={{fontSize:16}}>💬</span> Open WhatsApp Chat ↗</a></div>}
                      {edit&&<div style={{marginTop:8}}><div style={{fontSize:10,color:"#64748b",marginBottom:4}}>WhatsApp Link</div><EI value={d.whatsappLink} onChange={s("whatsappLink")} style={{color:"#4ade80",fontSize:12}}/></div>}
                    </div>
                  </Card>
                </div>
              )}

              {/* DEVICES */}
              {dtab==="devices"&&(
                <Card>
                  <SL>📦 Order Progress</SL>
                  <div style={{display:"flex",alignItems:"flex-start",marginBottom:16}}>
                    {ORDER.map((step,i)=>(

                  </div>
                  <div style={{borderRadius:10,overflow:"hidden",border:"1px solid #334155",marginBottom:10}}>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{background:"rgba(51,65,85,0.5)"}}>{["Device","Qty","Ship List",""].map(h=><th key={h} style={{padding:"8px 12px",textAlign:"left",color:"#64748b",fontWeight:600,fontSize:10,textTransform:"uppercase"}}>{h}</th>)}</tr></thead>
                      <tbody>
                        {d.devices.map((dv,i)=>(
                          <tr key={i} style={{borderTop:"1px solid #334155"}}>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.type} onChange={v=>updDev(i,"type",v)} style={{color:"#fff",fontWeight:600}}/>:<span style={{color:"#fff",fontWeight:600}}>{dv.type||"—"}</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.qty} onChange={v=>updDev(i,"qty",v)} style={{color:"#22d3ee",fontWeight:700,width:40}}/>:<span style={{color:"#22d3ee",fontWeight:700}}>{dv.qty||"—"}</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit?<EI value={dv.shipListLink} onChange={v=>updDev(i,"shipListLink",v)} style={{color:"#818cf8",fontSize:11}}/>:dv.shipListLink?<a href={dv.shipListLink} target="_blank" rel="noreferrer" style={{color:"#818cf8",textDecoration:"underline",fontSize:11}}>View ↗</a>:<span style={{color:"#334155",fontSize:11}}>—</span>}</td>
                            <td style={{padding:"8px 12px"}}>{edit&&<button onClick={()=>delDev(i)} style={{background:"transparent",border:"none",color:"#475569",fontSize:14,cursor:"pointer"}} onMouseOver={e=>e.target.style.color="#ef4444"} onMouseOut={e=>e.target.style.color="#475569"}>×</button>}</td>
                          </tr>
                        ))}
                        {d.devices.length===0&&<tr><td colSpan={4} style={{padding:"16px 12px",textAlign:"center",color:"#334155",fontSize:12}}>No devices added</td></tr>}

                    </table>
                  </div>

                </Card>
              )}

              {/* NOTES */}
              {dtab==="notes"&&(
                <div style={{maxWidth:700}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <SL>📝 Project Notes</SL>
                    <button onClick={()=>setShowAddNote(v=>!v)} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"6px 14px",fontSize:12,fontWeight:700,cursor:"pointer"}}>{showAddNote?"✕ Cancel":"+ Add Note"}</button>
                  </div>
                  {showAddNote&&(
                    <Card style={{marginBottom:12}}>
                      <input value={newAuthor} onChange={e=>setNewAuthor(e.target.value)} placeholder="Your name (optional)" style={{width:"100%",background:"#334155",border:"1px solid #475569",color:"#fff",fontSize:12,borderRadius:8,padding:"8px 12px",outline:"none",marginBottom:8,fontFamily:"inherit"}}/>
                      <textarea value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="Type your note..." rows={3} style={{...ta,marginBottom:8}}/>
                      <button onClick={saveNote} style={{background:"#4f46e5",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Save Note</button>
                    </Card>
                  )}
                  {d.notes.length===0&&<div style={{textAlign:"center",color:"#334155",padding:"32px 0",fontSize:13}}>No notes yet.</div>}
                  {[...d.notes].sort((a,b)=>(b.pinned?1:0)-(a.pinned?1:0)).map(n=>(
                    <div key={n.id} style={{borderRadius:14,padding:14,marginBottom:10,border:"1px solid "+(n.pinned?"#92400e":"#334155"),background:n.pinned?"rgba(120,53,15,0.2)":"#1e293b"}}>
                      <div style={{display:"flex",justifyContent:"space-between",gap:10,marginBottom:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:900,flexShrink:0}}>{ini(n.author)}</div>
                          <div><div style={{fontSize:12,fontWeight:700,color:"#fff"}}>{n.author}</div><div style={{fontSize:10,color:"#64748b"}}>{n.date}</div></div>
                          {n.pinned&&<span>📌</span>}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          <button onClick={()=>pinNote(n.id)} style={{background:n.pinned?"rgba(120,53,15,0.6)":"#334155",color:n.pinned?"#fcd34d":"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>{n.pinned?"Unpin":"Pin"}</button>
                          <button onClick={()=>delNote(n.id)} style={{background:"#334155",color:"#94a3b8",border:"none",borderRadius:8,padding:"3px 8px",fontSize:10,fontWeight:700,cursor:"pointer"}}>Delete</button>
                        </div>
                      </div>
                      <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6}}>{n.text}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ─── MAIN APP (with Auth Gate) ───
function App() {
  const [user,setUser]           = useState(window.__vsAuth.user);
  const [projects,setProjects]   = useState([]);
  const [activeId,setActiveId]   = useState(null);
  const [loading,setLoading]     = useState(true);
  const [syncing,setSyncing]     = useState(false);

  // Wire up auth callbacks
  useEffect(() => {
    window.__vsAuth.onLogin  = u => setUser(u);
    window.__vsAuth.onLogout = () => { setUser(null); setActiveId(null); };
  }, []);

  // Load data only when authenticated
  useEffect(()=>{
    if (!user) { setLoading(false); return; }
    const init = async () => {
      setLoading(true);
      try{ const c=localStorage.getItem("vs_projects"); if(c) setProjects(JSON.parse(c)); }catch(e){}
      let hashId=null;
      try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) hashId=h.replace("#project-",""); }catch(e){}
      const live = await api.getAll();
      if(live&&live.length>0){
        setProjects(live);
        try{ localStorage.setItem("vs_projects",JSON.stringify(live)); }catch(e){}
        if(hashId&&live.find(p=>p.id===hashId)) setActiveId(hashId);
      } else {
        try{ const c=localStorage.getItem("vs_projects"); if(c){ const list=JSON.parse(c); setProjects(list); if(hashId&&list.find(p=>p.id===hashId)) setActiveId(hashId); } }catch(e){}
      }
      setLoading(false);
    };
    init();
  },[user]);

  useEffect(()=>{
    try{ if(activeId) window.location.hash="project-"+activeId; else window.location.hash=""; }catch(e){}
  },[activeId]);

  useEffect(()=>{
    const onHash=()=>{ try{ const h=window.location.hash; if(h&&h.startsWith("#project-")) setActiveId(h.replace("#project-","")); else setActiveId(null); }catch(e){} };
    window.addEventListener("hashchange",onHash);
    return()=>window.removeEventListener("hashchange",onHash);
  },[]);

  const createProject = async (clientName,siteName,floorName) => {
    const p = BLANK(clientName,siteName,floorName);
    const updated = [p,...projects];
    setProjects(updated);
    try{ localStorage.setItem("vs_projects",JSON.stringify(updated)); }catch(e){}
    setSyncing(true); await api.save(p); setSyncing(false);
    setActiveId(p.id);
  };

  const saveProject = async updated => {
    // Find the previous version to detect changes
    const prev = projects.find(p=>p.id===updated.id);

    const list = projects.map(p=>p.id===updated.id?updated:p);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.save(updated);

    // Slack notifications — fire on meaningful changes
    if (prev) {
      // Status change (Green/Yellow/Red)
      if (prev.status !== updated.status) {
        api.slackNotify("statusChange", {
          id: updated.id, clientName: updated.clientName, siteName: updated.siteName,
          oldStatus: prev.status, newStatus: updated.status, internalOwner: updated.internalOwner
        });
      }
      // Blocker flagged (was N, now Y)
      if (prev.blockerPresent !== "Y" && updated.blockerPresent === "Y") {
        api.slackNotify("blocker", {
          id: updated.id, clientName: updated.clientName, siteName: updated.siteName,
          blockerText: updated.blockerText, blockerOwner: updated.blockerOwner, internalOwner: updated.internalOwner
        });
      }
      // Phase change
      if (prev.projectPhase !== updated.projectPhase) {
        api.slackNotify("phaseChange", {
          id: updated.id, clientName: updated.clientName, siteName: updated.siteName,
          oldPhase: prev.projectPhase, newPhase: updated.projectPhase, internalOwner: updated.internalOwner
        });
      }
    }
  };

  const deleteProject = async id => {
    const list = projects.filter(p=>p.id!==id);
    setProjects(list);
    try{ localStorage.setItem("vs_projects",JSON.stringify(list)); }catch(e){}
    await api.del(id);
    if(activeId===id) setActiveId(null);
  };

  // ── AUTH GATE ──
  if (!user) return <LoginScreen />;

  const active = projects.find(p=>p.id===activeId)||null;

  if(loading) return(
    <div style={{minHeight:"100vh",background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{fontSize:32}}>⚡</div>
      <div style={{fontSize:14,color:"#6366f1",fontWeight:700}}>Loading VergeSense Dashboard...</div>
      <div style={{fontSize:12,color:"#334155"}}>Syncing with Google Sheets</div>
    </div>
  );

  if(active) return <ProjectDashboard project={active} onSave={saveProject} onBack={()=>setActiveId(null)} syncing={syncing} user={user}/>;
  return <ProjectList projects={projects} onOpen={setActiveId} onCreate={createProject} onDelete={deleteProject} syncing={syncing} user={user}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
